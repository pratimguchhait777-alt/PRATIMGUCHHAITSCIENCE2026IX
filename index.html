<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SCIENCE_IX | Real-Time Sync Portal</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700;800&family=Space+Grotesk:wght=500;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --pw-primary: #070a13; 
            --pw-accent: #6366f1;  
            --pw-accent-glow: rgba(99, 102, 241, 0.4);
            --pw-bg: #030712;      
            --pw-card: rgba(17, 24, 39, 0.7);    
            --text-main: #f8fafc;  
            --text-muted: #94a3b8; 
            --pw-green: #10b981;  
            --pw-purple: #8b5cf6;
            --pw-red: #ef4444;
            --pw-border: rgba(255, 255, 255, 0.08); 
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background-color: var(--pw-bg);
            color: var(--text-main);
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
        }

        /* Ambient Background Glows */
        .bg-glow-1 {
            position: fixed; top: -10%; left: -10%; width: 50vw; height: 50vw;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 70%);
            z-index: -1; pointer-events: none;
        }
        .bg-glow-2 {
            position: fixed; bottom: -10%; right: -10%; width: 50vw; height: 50vw;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.1) 0%, transparent 70%);
            z-index: -1; pointer-events: none;
        }

        #particle-canvas, #celebration-canvas {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1; pointer-events: none;
        }
        #celebration-canvas { z-index: 2999; }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(20px); filter: blur(5px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        @keyframes xpPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.25) translateY(-4px); background: linear-gradient(135deg, #10b981, #059669); box-shadow: 0 0 35px rgba(16, 185, 129, 0.8); }
            100% { transform: scale(1); }
        }
        .xp-animate { animation: xpPop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.4); }

        /* --- LIVE TOAST NOTIFICATION CONTAINER --- */
        #notification-toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 5000;
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 90%;
            max-width: 360px;
        }

        .toast-card {
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid var(--pw-accent);
            box-shadow: 0 12px 40px rgba(99, 102, 241, 0.25);
            backdrop-filter: blur(16px);
            padding: 16px;
            border-radius: 14px;
            color: #fff;
            display: flex;
            flex-direction: column;
            gap: 4px;
            animation: toastIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.25);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .toast-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 4px; height: 100%;
            background: var(--pw-accent);
        }

        .toast-header { font-size: 0.8rem; font-weight: 800; color: #818cf8; text-transform: uppercase; letter-spacing: 0.5px; }
        .toast-body { font-size: 0.88rem; font-weight: 600; line-height: 1.4; color: #f1f5f9; }
        .toast-time { font-size: 0.7rem; color: var(--text-muted); margin-top: 2px; }

        @keyframes toastIn {
            from { transform: translateY(40px) scale(0.9); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }
        @keyframes toastOut {
            to { transform: translateX(120%) opacity: 0; }
        }

        /* --- LOGIN PORTAL --- */
        #welcome-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #02040a;
            display: flex; justify-content: center; align-items: center;
            z-index: 1000;
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .welcome-box {
            text-align: center; padding: 40px 25px;
            border-radius: 24px; background: rgba(10, 15, 30, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.8);
            width: 90%; max-width: 400px;
            backdrop-filter: blur(24px);
            animation: slideUpFade 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .welcome-box h1 { font-family: 'Space Grotesk', sans-serif; font-size: 2.5rem; font-weight: 900; margin-bottom: 12px; color: #fff; letter-spacing: -1.5px; }
        .welcome-box h1 span { color: var(--pw-accent); }
        .welcome-box p { color: var(--text-muted); margin-bottom: 30px; font-size: 0.9rem; font-weight: 500; }
        .welcome-box input {
            padding: 14px 20px; font-size: 1rem; border: 1px solid var(--pw-border);
            border-radius: 14px; background: rgba(255,255,255,0.02); color: #fff;
            outline: none; text-align: center; width: 100%; margin-bottom: 20px; font-weight: 600;
        }
        .welcome-box input:focus { border-color: var(--pw-accent); background: rgba(255,255,255,0.05); }
        .welcome-box button {
            padding: 14px; background: linear-gradient(135deg, var(--pw-accent), #4f46e5); color: #fff;
            border: none; border-radius: 14px; cursor: pointer; font-weight: 700; font-size: 1rem; width: 100%;
        }

        /* --- HEADER --- */
        header {
            display: flex; flex-direction: row; justify-content: space-between; align-items: center;
            padding: 16px 4%; background: rgba(3, 7, 18, 0.5); backdrop-filter: blur(30px);
            position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--pw-border); gap: 10px;
        }
        .logo { font-family: 'Space Grotesk', sans-serif; font-size: 1.6rem; font-weight: 900; letter-spacing: -1px; }
        .logo span { color: var(--pw-accent); }
        .user-stats { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
        #welcome-user { font-weight: 700; color: #fff; background: rgba(255,255,255,0.03); border: 1px solid var(--pw-border); padding: 6px 12px; border-radius: 10px; font-size: 0.8rem; }
        .xp-badge { background: linear-gradient(135deg, var(--pw-accent), #4f46e5); color: #fff; padding: 6px 12px; border-radius: 10px; font-weight: 800; font-size: 0.8rem; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.35); }
        .admin-badge { background: linear-gradient(135deg, var(--pw-green), #059669); color: #fff; padding: 6px 12px; border-radius: 10px; font-weight: 800; font-size: 0.8rem; display: none; }
        
        .sync-indicator { font-size: 0.75rem; font-weight: 700; padding: 6px 12px; border-radius: 10px; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); color: var(--pw-red); display: inline-flex; align-items: center; gap: 6px; }
        .sync-indicator span { width: 6px; height: 6px; background: var(--pw-red); border-radius: 50%; display: inline-block; box-shadow: 0 0 6px var(--pw-red); }
        .sync-connected { background: rgba(16, 185, 129, 0.1) !important; border-color: rgba(16, 185, 129, 0.2) !important; color: var(--pw-green) !important; }
        .sync-connected span { background: var(--pw-green) !important; box-shadow: 0 0 6px var(--pw-green) !important; }

        #admin-roster-panel { display: none; background: rgba(17, 24, 39, 0.3); border: 1px solid var(--pw-border); border-radius: 20px; padding: 20px; max-width: 1200px; margin: 20px auto 0 auto; backdrop-filter: blur(10px); }
        .roster-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
        .student-profile-card { background: rgba(255,255,255,0.02); border: 1px solid var(--pw-border); padding: 12px; border-radius: 12px; position: relative; overflow: hidden; }
        .student-profile-card::before { content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%; background: var(--pw-accent); }

        .container { max-width: 1200px; margin: 30px auto; padding: 0 16px; }

        /* --- DARK MODE SUBJECT CARDS --- */
        .subject-grid { display: grid; grid-template-columns: 1fr; gap: 18px; margin-bottom: 30px; }
        @media (min-width: 768px) { .subject-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1024px) { .subject-grid { grid-template-columns: repeat(3, 1fr); } }

        .subject-card {
            background: rgba(17, 24, 39, 0.7); 
            color: var(--text-main); 
            border-radius: 20px; 
            padding: 24px;
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.7); 
            cursor: pointer;
            backdrop-filter: blur(20px);
            border: 1px solid var(--pw-border);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.3s, box-shadow 0.3s;
        }
        
        .subject-card.sc-phy:hover { border-color: rgba(99, 102, 241, 0.5); box-shadow: 0 0 25px rgba(99, 102, 241, 0.2); transform: translateY(-3px); }
        .subject-card.sc-chem:hover { border-color: rgba(16, 185, 129, 0.5); box-shadow: 0 0 25px rgba(16, 185, 129, 0.2); transform: translateY(-3px); }
        .subject-card.sc-bio:hover { border-color: rgba(236, 72, 153, 0.5); box-shadow: 0 0 25px rgba(236, 72, 153, 0.2); transform: translateY(-3px); }

        .subject-info { display: flex; align-items: center; gap: 18px; }
        .subject-icon-box { 
            width: 52px; 
            height: 52px; 
            border-radius: 14px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: 800; 
            font-size: 1.15rem; 
        }
        .subject-name { font-weight: 700; font-size: 1.15rem; letter-spacing: -0.3px; }
        .subject-meta { display: flex; align-items: center; gap: 14px; }
        .progress-text { font-size: 0.85rem; font-weight: 700; color: var(--text-muted); text-align: right; }
        .chevron-right { color: rgba(255, 255, 255, 0.3); font-size: 1.1rem; font-weight: bold; transition: color 0.2s; }
        .subject-card:hover .chevron-right { color: #fff; }

        /* --- CHAPTER DIRECTORY VIEW (DARK THEME) --- */
        .directory-view { display: none; animation: slideUpFade 0.4s ease; }
        .back-btn { background: rgba(255,255,255,0.03); color: #fff; border: 1px solid var(--pw-border); padding: 10px 18px; border-radius: 12px; cursor: pointer; font-weight: 700; display: inline-flex; align-items: center; gap: 8px; margin-bottom: 25px; transition: background 0.2s; }
        .back-btn:hover { background: rgba(255,255,255,0.08); }
        
        .directory-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .directory-title { font-family: 'Space Grotesk', sans-serif; font-size: 1.8rem; font-weight: 900; color: #fff; }
        .btn-create-chapter { background: rgba(99, 102, 241, 0.1); border: 1px solid var(--pw-accent); color: #fff; padding: 10px 18px; border-radius: 12px; cursor: pointer; font-weight: 700; font-size: 0.85rem; display: none; }
        
        .chapter-list { display: flex; flex-direction: column; gap: 14px; }
        
        .chapter-row { background: rgba(15, 23, 42, 0.6); border: 1px solid var(--pw-border); border-radius: 16px; overflow: hidden; backdrop-filter: blur(10px); }
        .chapter-trigger { padding: 20px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: background 0.2s; }
        .chapter-trigger:hover { background: rgba(30, 41, 59, 0.5); }
        .chapter-label { font-size: 0.75rem; font-weight: 800; color: #818cf8; text-transform: uppercase; letter-spacing: 0.5px; background: rgba(99, 102, 241, 0.12); padding: 3px 8px; border-radius: 6px; display: inline-block; margin-bottom: 6px; }
        .chapter-title-text { font-size: 1.1rem; font-weight: 700; color: #fff; }
        .chapter-counters { font-size: 0.85rem; color: var(--text-muted); margin-top: 6px; font-weight: 500; }
        
        .chapter-actions { display: flex; align-items: center; gap: 14px; }
        .btn-delete-chapter { background: rgba(239, 68, 68, 0.15); border: none; color: #fca5a5; padding: 6px 12px; border-radius: 8px; font-size: 0.75rem; font-weight: 700; display: none; }
        .chevron-down { color: #475569; font-size: 1rem; transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        .chapter-row.active .chevron-down { transform: rotate(180deg); color: #fff; }

        .chapter-content-pool { display: none; padding: 25px; background: #090d16; border-top: 1px solid var(--pw-border); }
        .chapter-row.active .chapter-content-pool { display: block; }
        
        .sub-slots-container { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 900px) { .sub-slots-container { grid-template-columns: repeat(3, 1fr); } }
        
        .inner-bucket { background: rgba(10, 15, 30, 0.4); border-radius: 14px; padding: 18px; border: 1px solid var(--pw-border); display: flex; flex-direction: column; justify-content: space-between; min-height: 180px; }
        .inner-bucket h4 { font-size: 0.9rem; font-weight: 800; color: #fff; margin-bottom: 12px; border-bottom: 1px solid var(--pw-border); padding-bottom: 8px; }
        
        .content-list { list-style: none; margin-bottom: 15px; }
        .content-item { display: flex; justify-content: space-between; align-items: center; background: rgba(255, 255, 255, 0.01); padding: 10px 12px; border-radius: 10px; margin-bottom: 6px; font-size: 0.85rem; border: 1px solid var(--pw-border); color: #e2e8f0; gap: 10px; }
        .content-item span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 140px; }
        .btn-view { background: rgba(255, 255, 255, 0.04); color: #fff; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 0.75rem; border: 1px solid rgba(255,255,255,0.08); font-weight: 700; transition: background 0.2s; }
        .btn-view:hover { background: var(--pw-accent); border-color: transparent; }
        .btn-delete-item { background: transparent; border: none; color: #fca5a5; cursor: pointer; font-size: 0.8rem; display: none; }

        .admin-upload-panel { display: none; margin-top: auto; }
        .native-pdf-label { display: block; background: rgba(99, 102, 241, 0.03); color: #a5b4fc; padding: 8px 10px; border-radius: 10px; cursor: pointer; font-size: 0.75rem; font-weight: 700; border: 1px dashed rgba(99, 102, 241, 0.4); text-align: center; margin-bottom: 6px; }

        /* --- MODALS & DIALOGS --- */
        #viewer-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(3, 5, 10, 0.95); display: none; justify-content: center; align-items: center; z-index: 2000; backdrop-filter: blur(20px); padding: 10px; }
        .modal-content { width: 100%; height: 100%; background: #0b0f19; border-radius: 16px; overflow: hidden; position: relative; border: 1px solid rgba(255,255,255,0.08); display: flex; flex-direction: column; }
        @media(min-width: 768px) { .modal-content { width: 94%; height: 90%; border-radius: 28px; } }
        .close-modal { position: absolute; top: 12px; right: 12px; color: #fff; font-size: 0.75rem; cursor: pointer; font-weight: 800; background: rgba(239, 68, 68, 0.15); border: 1px solid rgba(239, 68, 68, 0.3); padding: 8px 16px; border-radius: 8px; z-index: 2100; }
        #view-frame { width: 100%; height: 100%; border: none; background: #0b0f19; flex-grow: 1; padding-top: 60px; }

        #custom-dialog-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(2, 4, 8, 0.85); display: none; justify-content: center; align-items: center; z-index: 4000; backdrop-filter: blur(20px); padding: 20px; }
        .dialog-box { width: 100%; max-width: 440px; background: rgba(15, 23, 42, 0.95); border-radius: 20px; padding: 25px; border: 1px solid var(--pw-border); text-align: center; }
        .dialog-box h3 { font-size: 1.2rem; font-weight: 800; color: #fff; margin-bottom: 10px; }
        .dialog-box p { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 20px; }
        .dialog-box input { width: 100%; padding: 12px 16px; border-radius: 10px; border: 1px solid var(--pw-border); background: rgba(255,255,255,0.03); color: #fff; font-size: 0.95rem; outline: none; margin-bottom: 20px; text-align: center; }
        .dialog-actions { display: flex; gap: 10px; justify-content: center; }
        .dialog-actions button { padding: 10px 20px; font-size: 0.85rem; font-weight: 700; border-radius: 8px; cursor: pointer; border: none; }
        .btn-dialog-primary { background: var(--pw-accent); color: #fff; }
        .btn-dialog-secondary { background: rgba(255,255,255,0.05); color: #fff; }
    </style>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>

    <canvas id="particle-canvas"></canvas>
    <canvas id="celebration-canvas"></canvas>
    
    <div class="bg-glow-1"></div><div class="bg-glow-2"></div>

    <div id="notification-toast-container"></div>

    <div id="welcome-screen">
        <div class="welcome-box">
            <h1>SCIENCE_<span>IX</span></h1>
            <p>Sign in to access your batch classroom</p>
            <input type="text" id="username-input" placeholder="Enter Student Name / ID" autocomplete="off"><br>
            <button id="auth-submit-btn" onclick="entrySetup()">Let's Study</button>
        </div>
    </div>

    <header>
        <div class="logo">SCIENCE_<span>IX</span></div>
        <div class="user-stats">
            <span id="sync-status" class="sync-indicator"><span></span> Connecting...</span>
            <span id="welcome-user">Loading...</span>
            <div id="admin-indicator" class="admin-badge">Admin</div>
            <div id="xp-badge-wrapper" class="xp-badge">✨ <span id="xp-count">0</span> XP</div>
        </div>
    </header>

    <div id="admin-roster-panel">
        <h2>Classroom Management (Active Student Profiles)</h2>
        <div class="roster-grid" id="roster-grid-target"></div>
    </div>

    <div class="container">
        
        <div id="subject-hub-view" class="subject-grid">
            <div class="subject-card sc-phy" onclick="openSubjectDirectory('phy')">
                <div class="subject-info">
                    <div class="subject-icon-box" style="background: rgba(99, 102, 241, 0.1); color: #818cf8; border: 1px solid rgba(99, 102, 241, 0.2);">Ph</div>
                    <span class="subject-name">Physics</span>
                </div>
                <div class="subject-meta">
                    <div class="progress-text">📂 <span id="count-phy">0</span> Chapters</div>
                    <span class="chevron-right">❯</span>
                </div>
            </div>
            
            <div class="subject-card sc-chem" onclick="openSubjectDirectory('chem')">
                <div class="subject-info">
                    <div class="subject-icon-box" style="background: rgba(16, 185, 129, 0.1); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.2);">Ch</div>
                    <span class="subject-name">Chemistry</span>
                </div>
                <div class="subject-meta">
                    <div class="progress-text">📂 <span id="count-chem">0</span> Chapters</div>
                    <span class="chevron-right">❯</span>
                </div>
            </div>

            <div class="subject-card sc-bio" onclick="openSubjectDirectory('bio')">
                <div class="subject-info">
                    <div class="subject-icon-box" style="background: rgba(236, 72, 153, 0.1); color: #f472b6; border: 1px solid rgba(236, 72, 153, 0.2);">Bi</div>
                    <span class="subject-name">Biology</span>
                </div>
                <div class="subject-meta">
                    <div class="progress-text">📂 <span id="count-bio">0</span> Chapters</div>
                    <span class="chevron-right">❯</span>
                </div>
            </div>
        </div>

        <div id="directory-view" class="directory-view">
            <button class="back-btn" onclick="closeSubjectDirectory()">← Back to Subjects</button>
            <div class="directory-header">
                <h2 class="directory-title" id="directory-title-text">Subject Workspace</h2>
                <button class="btn-create-chapter" id="btn-add-chapter" onclick="handleCreateChapterClick()">+ New Chapter</button>
            </div>
            <div class="chapter-list" id="chapter-list-target"></div>
        </div>

    </div>

    <div id="viewer-modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeViewer()">✕ Close Document</span>
            <iframe id="view-frame" src=""></iframe>
        </div>
    </div>

    <div id="custom-dialog-modal">
        <div class="dialog-box" id="dialog-box-content"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAs79VbT889T-Ouy_Y-1wREx86u8o_L6ks",
            authDomain: "science-ix-87252.firebaseapp.com",
            projectId: "science-ix-87252",
            storageBucket: "science-ix-87252.appspot.com",
            messagingSenderId: "364508216393",
            appId: "1:364508216393:web:bda878bc90069cb23214da"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let activeUser = localStorage.getItem('science_ix_session');
        let currentXP = 0;
        let readLog = [];
        let selectedSubjectCode = "";
        let initialNotificationsLoadCompleted = false;

        // Particle System Simulation
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5 + 1; this.speedX = Math.random() * 0.2 - 0.1;
                this.speedY = Math.random() * 0.2 - 0.1; this.opacity = Math.random() * 0.3 + 0.1;
            }
            update() { this.x += this.speedX; this.y += this.speedY; if (this.x < 0 || this.x > canvas.width) this.speedX *= -1; if (this.y < 0 || this.y > canvas.height) this.speedY *= -1; }
            draw() { ctx.fillStyle = `rgba(99, 102, 241, ${this.opacity})`; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
        }
        for (let i = 0; i < 20; i++) particles.push(new Particle());
        function animateParticles() { ctx.clearRect(0, 0, canvas.width, canvas.height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animateParticles); }
        animateParticles();

        /* Confetti Canvas Engine */
        const celCanvas = document.getElementById('celebration-canvas');
        const celCtx = celCanvas.getContext('2d');
        let confettiArray = [];
        let runningCelebration = false;
        function resizeCelCanvas() { celCanvas.width = window.innerWidth; celCanvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCelCanvas); resizeCelCanvas();

        class Confetti {
            constructor() {
                this.x = Math.random() * celCanvas.width; this.y = Math.random() * -celCanvas.height - 20;
                this.size = Math.random() * 6 + 6; this.speedY = Math.random() * 4 + 3; this.speedX = Math.random() * 3 - 1.5;
                this.rotation = Math.random() * 360; this.rotationSpeed = Math.random() * 4 - 2;
                const colors = ['#6366f1', '#10b981', '#ec4899', '#f59e0b', '#3b82f6'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
            }
            update() { this.y += this.speedY; this.x += this.speedX; this.rotation += this.rotationSpeed; }
            draw() { celCtx.save(); celCtx.translate(this.x, this.y); celCtx.rotate(this.rotation * Math.PI / 180); celCtx.fillStyle = this.color; celCtx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size); celCtx.restore(); }
        }
        function triggerConfettiBurst() { confettiArray = []; for (let i = 0; i < 150; i++) confettiArray.push(new Confetti()); if (!runningCelebration) { runningCelebration = true; animateConfetti(); } }
        function animateConfetti() { if (confettiArray.length === 0) { celCtx.clearRect(0, 0, celCanvas.width, celCanvas.height); runningCelebration = false; return; } celCtx.clearRect(0, 0, celCanvas.width, celCanvas.height); for (let i = confettiArray.length - 1; i >= 0; i--) { confettiArray[i].update(); confettiArray[i].draw(); if (confettiArray[i].y > celCanvas.height) confettiArray.splice(i, 1); } requestAnimationFrame(animateConfetti); }

        function playPartyPopSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                let osc1 = audioCtx.createOscillator(); let gain1 = audioCtx.createGain();
                osc1.type = 'sine'; osc1.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc1.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.15);
                gain1.gain.setValueAtTime(0.3, audioCtx.currentTime); gain1.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                osc1.connect(gain1); gain1.connect(audioCtx.destination); osc1.start(); osc1.stop(audioCtx.currentTime + 0.2);
                setTimeout(() => {
                    let osc2 = audioCtx.createOscillator(); let gain2 = audioCtx.createGain();
                    osc2.type = 'triangle'; osc2.frequency.setValueAtTime(523.25, audioCtx.currentTime);
                    osc2.frequency.exponentialRampToValueAtTime(1046.50, audioCtx.currentTime + 0.2);
                    gain2.gain.setValueAtTime(0.2, audioCtx.currentTime); gain2.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                    osc2.connect(gain2); gain2.connect(audioCtx.destination); osc2.start(); osc2.stop(audioCtx.currentTime + 0.3);
                }, 80);
            } catch (e) {}
        }

        /* Synthesized Alert Chime for newly arrived documents */
        function playIncomingDocumentChime() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(440, audioCtx.currentTime); // A4 Note
                osc.frequency.setValueAtTime(587.33, audioCtx.currentTime + 0.1); // Jumps to D5
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 0.4);
            } catch (e) {}
        }

        function processMilestoneEvaluator(newXp) {
            const milestones = [200, 400, 800];
            const storageKey = `notified_milestone_${activeUser.toUpperCase()}_`;
            milestones.forEach(target => {
                if (newXp >= target && !localStorage.getItem(storageKey + target)) {
                    localStorage.setItem(storageKey + target, "true");
                    setTimeout(() => { playPartyPopSound(); triggerConfettiBurst(); showCustomAlert("🎉 Level Up Celebration!", `Congratulations <strong>${activeUser}</strong>! You have reached a massive milestone of <strong>${target} XP</strong>! Keep grinding! 🔥`); }, 800);
                }
            });
        }


        /* =========================================================================
           🚀 NEW FEATURE: REAL-TIME GLOBAL STUDENT NOTIFICATION PIPELINE
           ========================================================================= */
        function broadcastGlobalNotification(messageText) {
            // Fired by Admin upload tracks to populate Firestore collection cluster
            db.collection('notifications').add({
                text: messageText,
                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                sender: activeUser || "Admin"
            }).catch(err => console.error("Notification broadcast dropped: ", err));
        }

        function listenToLiveNotificationFeed() {
            // Listens for any additions to document collections in real-time
            db.collection('notifications')
              .orderBy('timestamp', 'desc')
              .limit(5)
              .onSnapshot(snapshot => {
                  if (!initialNotificationsLoadCompleted) {
                      // Skip historic items already on document timeline on cold boot initialization
                      initialNotificationsLoadCompleted = true;
                      return;
                  }
                  
                  snapshot.docChanges().forEach(change => {
                      if (change.type === "added") {
                          const alertData = change.doc.data();
                          // Prevent triggering audio chime for the admin who uploaded it
                          if (activeUser && activeUser.toUpperCase() !== "PRATIM") {
                              spawnNotificationToast(alertData.text);
                          }
                      }
                  });
              });
        }

        function spawnNotificationToast(message) {
            playIncomingDocumentChime();
            const container = document.getElementById('notification-toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast-card';
            
            toast.innerHTML = `
                <div class="toast-header">🔔 Workspace Update</div>
                <div class="toast-body">${message}</div>
                <div class="toast-time">Just Now</div>
            `;
            
            container.appendChild(toast);
            
            // Auto-cleanup toast element after 6.5 seconds
            setTimeout(() => {
                toast.style.animation = "toastOut 0.4s forwards";
                setTimeout(() => toast.remove(), 400);
            }, 6500);
        }
        /* ========================================================================= */


        // Custom Overrides Dialog UI Components
        function showCustomPrompt(title, placeholder, onConfirm) {
            const modal = document.getElementById('custom-dialog-modal');
            const target = document.getElementById('dialog-box-content');
            target.innerHTML = `
                <h3>${title}</h3>
                <input type="text" id="custom-prompt-input" placeholder="${placeholder}" autocomplete="off">
                <div class="dialog-actions">
                    <button class="btn-dialog-secondary" onclick="closeCustomDialog()">Cancel</button>
                    <button class="btn-dialog-primary" id="btn-dialog-confirm">Submit</button>
                </div>
            `;
            modal.style.display = 'flex';
            document.getElementById('btn-dialog-confirm').onclick = () => {
                const val = document.getElementById('custom-prompt-input').value.trim();
                closeCustomDialog(); if (val) onConfirm(val);
            };
        }

        function showCustomConfirm(title, message, onConfirm) {
            const modal = document.getElementById('custom-dialog-modal');
            const target = document.getElementById('dialog-box-content');
            target.innerHTML = `
                <h3>${title}</h3><p>${message}</p>
                <div class="dialog-actions">
                    <button class="btn-dialog-secondary" onclick="closeCustomDialog()">Cancel</button>
                    <button class="btn-dialog-primary" id="btn-dialog-confirm">Confirm</button>
                </div>
            `;
            modal.style.display = 'flex';
            document.getElementById('btn-dialog-confirm').onclick = () => { closeCustomDialog(); onConfirm(); };
        }

        function showCustomAlert(title, message) {
            const modal = document.getElementById('custom-dialog-modal');
            const target = document.getElementById('dialog-box-content');
            target.innerHTML = `
                <h3>${title}</h3><p>${message}</p>
                <div class="dialog-actions"><button class="btn-dialog-primary" onclick="closeCustomDialog()">OK</button></div>
            `;
            modal.style.display = 'flex';
        }
        function closeCustomDialog() { document.getElementById('custom-dialog-modal').style.display = 'none'; }

        auth.signInAnonymously().catch(err => console.error(err));

        window.addEventListener('DOMContentLoaded', () => {
            if (activeUser) {
                applyIdentityConfig(activeUser);
                document.getElementById('welcome-screen').style.display = 'none';
                syncStudentProfileCloud(activeUser);
            }
            listenToGlobalCurriculum();
            listenToActiveRoster();
            listenToLiveNotificationFeed(); // Turn on push-relay listener pipeline
        });

        function entrySetup() {
            const inputName = document.getElementById('username-input').value.trim();
            if (!inputName) { showCustomAlert("Identity Verification", "Please enter your name!"); return; }
            activeUser = inputName;
            localStorage.setItem('science_ix_session', inputName);
            syncStudentProfileCloud(inputName);
            applyIdentityConfig(inputName);
            document.getElementById('welcome-screen').style.display = 'none';
        }

        function applyIdentityConfig(username) {
            document.getElementById('welcome-user').innerText = "👨‍🎓 " + username;
            if (username.toUpperCase() === "PRATIM") {
                document.getElementById('admin-indicator').style.display = 'inline-block';
                document.getElementById('admin-roster-panel').style.display = 'block';
                document.getElementById('btn-add-chapter').style.display = 'block';
            }
        }

        function syncStudentProfileCloud(username) {
            const keyName = username.toUpperCase();
            db.collection('students').doc(keyName).get().then(doc => {
                if (doc.exists) {
                    currentXP = doc.data().xp || 0; readLog = doc.data().readLog || [];
                    document.getElementById('xp-count').innerText = currentXP;
                    if (activeUser.toUpperCase() !== "PRATIM") { processMilestoneEvaluator(currentXP); }
                } else {
                    db.collection('students').doc(keyName).set({ name: username, xp: 0, readLog: [], joined: new Date().toLocaleDateString() });
                }
            });
        }

        function listenToActiveRoster() {
            db.collection('students').onSnapshot(snapshot => {
                const rosterGrid = document.getElementById('roster-grid-target');
                if (!rosterGrid) return; rosterGrid.innerHTML = "";
                snapshot.forEach(doc => {
                    const profile = doc.data();
                    const card = document.createElement('div');
                    card.className = 'student-profile-card';
                    card.innerHTML = `<strong style="color: #fff;">${profile.name}</strong><br><span style="color: var(--text-muted); font-size:0.75rem;">✨ ${profile.xp} XP</span>`;
                    rosterGrid.appendChild(card);
                    
                    if (activeUser && doc.id === activeUser.toUpperCase()) {
                        const previousXP = currentXP;
                        currentXP = profile.xp || 0; readLog = profile.readLog || [];
                        document.getElementById('xp-count').innerText = currentXP;
                        if (currentXP > previousXP && activeUser.toUpperCase() !== "PRATIM") { processMilestoneEvaluator(currentXP); }
                    }
                });
            });
        }

        function listenToGlobalCurriculum() {
            db.collection('curriculum').doc('nested_master_folders').onSnapshot(doc => {
                const indicator = document.getElementById('sync-status');
                indicator.className = "sync-indicator sync-connected";
                indicator.innerHTML = "<span></span> Cloud Synced";
                window.latestCloudPayload = doc.exists ? doc.data() : { phy: [], chem: [], bio: [] };
                document.getElementById('count-phy').innerText = (window.latestCloudPayload.phy || []).length;
                document.getElementById('count-chem').innerText = (window.latestCloudPayload.chem || []).length;
                document.getElementById('count-bio').innerText = (window.latestCloudPayload.bio || []).length;
                if (selectedSubjectCode) { refreshDirectoryUI(); }
            });
        }

        function openSubjectDirectory(subjectCode) {
            selectedSubjectCode = subjectCode;
            document.getElementById('subject-hub-view').style.display = 'none';
            document.getElementById('directory-view').style.display = 'block';
            const titleMap = { phy: 'Physics Studio', chem: 'Chemistry Studio', bio: 'Biology Studio' };
            document.getElementById('directory-title-text').innerText = titleMap[subjectCode];
            refreshDirectoryUI();
        }

        function closeSubjectDirectory() { selectedSubjectCode = ""; document.getElementById('directory-view').style.display = 'none'; document.getElementById('subject-hub-view').style.display = 'grid'; }
        function toggleChapterDropdown(element) { element.closest('.chapter-row').classList.toggle('active'); }

        function refreshDirectoryUI() {
            const targetList = document.getElementById('chapter-list-target');
            targetList.innerHTML = "";
            const chapters = window.latestCloudPayload[selectedSubjectCode] || [];
            const isAdmin = (activeUser && activeUser.toUpperCase() === "PRATIM");
            const admStyle = isAdmin ? 'style="display:inline-block;"' : '';
            const dskStyle = isAdmin ? 'style="display:block;"' : '';

            chapters.forEach((chapter, index) => {
                const row = document.createElement('div');
                row.className = 'chapter-row';
                const cNotesCount = (chapter.notes || []).length;
                const cDppCount = (chapter.dpps || []).length;
                const cTestCount = (chapter.tests || []).length;
                const chNumberLabel = String(index + 1).padStart(2, '0');

                row.innerHTML = `
                    <div class="chapter-trigger" onclick="toggleChapterDropdown(this)">
                        <div>
                            <span class="chapter-label">CH - ${chNumberLabel}</span>
                            <div class="chapter-title-text">${chapter.title}</div>
                            <div class="chapter-counters">Notes: ${cNotesCount} • DPPs: ${cDppCount} • Tests: ${cTestCount}</div>
                        </div>
                        <div class="chapter-actions" onclick="event.stopPropagation();">
                            <button class="btn-delete-chapter" ${admStyle} onclick="deleteChapterRow(${index})">🗑 Delete</button>
                            <span class="chevron-down">▼</span>
                        </div>
                    </div>
                    <div class="chapter-content-pool">
                        <div class="sub-slots-container">
                            <div class="inner-bucket">
                                <div>
                                    <h4>📚 Class Notes</h4>
                                    <ul class="content-list" id="list-notes-${index}"></ul>
                                </div>
                                <div class="admin-upload-panel" ${dskStyle}>
                                    <label class="native-pdf-label" for="file-notes-${index}">📤 Upload Notes PDF</label>
                                    <button class="native-pdf-label" style="background:rgba(255,255,255,0.02); border-style:solid;" onclick="handleURLInputTrigger(${index}, 'notes')">🔗 Paste Link</button>
                                    <input type="file" id="file-notes-${index}" accept=".pdf" style="display:none;" onchange="handleUniversalUpload(${index}, 'notes', this)">
                                </div>
                            </div>
                            
                            <div class="inner-bucket">
                                <div>
                                    <h4>📝 Practice Papers (DPP)</h4>
                                    <ul class="content-list" id="list-dpps-${index}"></ul>
                                </div>
                                <div class="admin-upload-panel" ${dskStyle}>
                                    <label class="native-pdf-label" for="file-dpps-${index}">📤 Upload DPP (PDF/HTML)</label>
                                    <button class="native-pdf-label" style="background:rgba(255,255,255,0.02); border-style:solid;" onclick="handleURLInputTrigger(${index}, 'dpps')">🔗 Paste Link</button>
                                    <input type="file" id="file-dpps-${index}" accept=".pdf,.html" style="display:none;" onchange="handleUniversalUpload(${index}, 'dpps', this)">
                                </div>
                            </div>

                            <div class="inner-bucket">
                                <div>
                                    <h4>🏆 Monthly Tests</h4>
                                    <ul class="content-list" id="list-tests-${index}"></ul>
                                </div>
                                <div class="admin-upload-panel" ${dskStyle}>
                                    <label class="native-pdf-label" for="file-tests-${index}">📤 Upload Test (PDF/HTML)</label>
                                    <button class="native-pdf-label" style="background:rgba(255,255,255,0.02); border-style:solid;" onclick="handleURLInputTrigger(${index}, 'tests')">🔗 Paste Link</button>
                                    <input type="file" id="file-tests-${index}" accept=".pdf,.html" style="display:none;" onchange="handleUniversalUpload(${index}, 'tests', this)">
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                targetList.appendChild(row);
                renderItemsList(chapter.notes, `list-notes-${index}`, index, 'notes');
                renderItemsList(chapter.dpps, `list-dpps-${index}`, index, 'dpps');
                renderItemsList(chapter.tests, `list-tests-${index}`, index, 'tests');
            });
        }

        function renderItemsList(arr, elementId, chIndex, bucketKey) {
            const list = document.getElementById(elementId); if (!list || !arr) return;
            const isAdmin = (activeUser && activeUser.toUpperCase() === "PRATIM");
            const admStyle = isAdmin ? 'style="display:inline-block;"' : '';
            
            arr.forEach((item, itemIndex) => {
                const li = document.createElement('li');
                li.className = 'content-item';
                let icon = '📁'; if (item.type === 'html') icon = '🌐'; if (item.type === 'link') icon = '🔗';
                
                li.innerHTML = `
                    <span>${icon} ${item.name}</span>
                    <div style="display:flex; gap:6px; align-items:center;">
                        <button class="btn-delete-item" ${admStyle} onclick="deleteFileAsset(${chIndex}, '${bucketKey}', ${itemIndex})">✕</button>
                        <button class="btn-view" onclick="launchViewer(${chIndex}, '${bucketKey}', ${itemIndex})">Open</button>
                    </div>
                `;
                list.appendChild(li);
            });
        }

        function handleCreateChapterClick() {
            showCustomPrompt("Create New Chapter", "Enter chapter title name:", (title) => {
                let copy = window.latestCloudPayload;
                if (!copy[selectedSubjectCode]) copy[selectedSubjectCode] = [];
                copy[selectedSubjectCode].push({ title: title, notes: [], dpps: [], tests: [] });
                db.collection('curriculum').doc('nested_master_folders').set(copy).then(() => {
                    const subNames = {phy: "Physics", chem: "Chemistry", bio: "Biology"};
                    broadcastGlobalNotification(`New Chapter Created: "${title}" has been introduced to the ${subNames[selectedSubjectCode]} portfolio!`);
                });
            });
        }

        function deleteChapterRow(index) {
            showCustomConfirm("Delete Chapter Portfolio?", "This cleans out everything inside this chapter forever.", () => {
                let copy = window.latestCloudPayload;
                copy[selectedSubjectCode].splice(index, 1);
                db.collection('curriculum').doc('nested_master_folders').set(copy);
            });
        }

        function deleteFileAsset(chIndex, bucketKey, itemIndex) {
            showCustomConfirm("Delete Document?", "Remove this workspace file item?", () => {
                let copy = window.latestCloudPayload;
                copy[selectedSubjectCode][chIndex][bucketKey].splice(itemIndex, 1);
                db.collection('curriculum').doc('nested_master_folders').set(copy);
            });
        }

        function handleURLInputTrigger(chIndex, bucketKey) {
            showCustomPrompt("Document Label Name", "Enter display text label:", (label) => {
                showCustomPrompt("Paste Destination URL Link", "Paste Google Drive/Web URL path link:", (linkUrl) => {
                    let copy = window.latestCloudPayload;
                    const id = "file-" + Date.now();
                    const currentChapterTitle = copy[selectedSubjectCode][chIndex].title;
                    copy[selectedSubjectCode][chIndex][bucketKey].push({ id: id, name: label, data: linkUrl, type: 'link' });
                    
                    db.collection('curriculum').doc('nested_master_folders').set(copy).then(() => {
                        const bucketNames = {notes: "Class Notes 📚", dpps: "Practice Paper 📝", tests: "Monthly Test 🏆"};
                        broadcastGlobalNotification(`New ${bucketNames[bucketKey]} Link Added: "${label}" has been uploaded under "${currentChapterTitle}".`);
                    });
                });
            });
        }

        function handleUniversalUpload(chIndex, bucketKey, input) {
            const file = input.files[0]; if (!file) return;
            const ext = file.name.split('.').pop().toLowerCase();
            
            showCustomPrompt("Document Label Name", "Enter display text label:", (label) => {
                const r = new FileReader();
                r.onload = function(e) {
                    let rawData = e.target.result;
                    if (ext === 'html') {
                        const txt = new TextDecoder("utf-8").decode(e.target.result);
                        rawData = 'data:text/html;charset=utf-8,' + encodeURIComponent(txt);
                    }
                    let copy = window.latestCloudPayload;
                    const id = "file-" + Date.now() + "-" + Math.floor(Math.random()*100);
                    const currentChapterTitle = copy[selectedSubjectCode][chIndex].title;
                    copy[selectedSubjectCode][chIndex][bucketKey].push({ id: id, name: label, data: rawData, type: ext });
                    
                    db.collection('curriculum').doc('nested_master_folders').set(copy).then(() => {
                        const bucketNames = {notes: "Class Notes 📚", dpps: "Practice Paper 📝", tests: "Monthly Test 🏆"};
                        broadcastGlobalNotification(`New ${bucketNames[bucketKey]} Document Added: "${label}" has been uploaded under "${currentChapterTitle}".`);
                    }).catch(() => {
                        showCustomAlert("Storage Cap Limit reached", "File too heavy for direct inline sync string configuration! Please upload to Google Drive and use 'Paste Link' instead.");
                    });
                };
                if (ext === 'html') r.readAsArrayBuffer(file); else r.readAsDataURL(file);
            });
        }

        function launchViewer(chIndex, bucketKey, itemIndex) {
            const item = window.latestCloudPayload[selectedSubjectCode][chIndex][bucketKey][itemIndex];
            if (item.type === 'link') { window.open(item.data, '_blank'); } else { document.getElementById('view-frame').src = item.data; document.getElementById('viewer-modal').style.display = 'flex'; }

            if (activeUser && activeUser.toUpperCase() !== "PRATIM") {
                const uniqueId = item.id || `${selectedSubjectCode}-${chIndex}-${bucketKey}-${itemIndex}`;
                if (!readLog.includes(uniqueId)) {
                    readLog.push(uniqueId);
                    db.collection('students').doc(activeUser.toUpperCase()).update({ xp: firebase.firestore.FieldValue.increment(15), readLog: readLog }).then(() => {
                        const b = document.getElementById('xp-badge-wrapper'); b.classList.add('xp-animate'); setTimeout(() => b.classList.remove('xp-animate'), 600);
                    });
                }
            }
        }

        function closeViewer() { document.getElementById('viewer-modal').style.display = 'none'; document.getElementById('view-frame').src = ""; }
    </script>
</body>
</html>
