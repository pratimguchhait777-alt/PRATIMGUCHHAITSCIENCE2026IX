<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SCIENCE_IX | Real-Time Sync Portal</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --pw-primary: #070a13; 
            --pw-accent: #6366f1;  
            --pw-accent-glow: rgba(99, 102, 241, 0.4);
            --pw-bg: #030712;      
            --pw-card: rgba(17, 24, 39, 0.7);    
            --text-main: #f8fafc;  
            --text-muted: #94a3b8; 
            --pw-green: #10b981;  
            --pw-purple: #8b5cf6;
            --pw-red: #ef4444;
            --pw-border: rgba(255, 255, 255, 0.08); 
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background-color: var(--pw-bg);
            color: var(--text-main);
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
        }

        /* Ambient Background Glows */
        .bg-glow-1 {
            position: fixed; top: -10%; left: -10%; width: 50vw; height: 50vw;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 70%);
            z-index: -1; pointer-events: none;
        }
        .bg-glow-2 {
            position: fixed; bottom: -10%; right: -10%; width: 50vw; height: 50vw;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.1) 0%, transparent 70%);
            z-index: -1; pointer-events: none;
        }

        #particle-canvas {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1; pointer-events: none;
        }

        /* --- KINETIC ANIMATIONS --- */
        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(30px); filter: blur(10px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        @keyframes slotGlow {
            0%, 100% { 
                border-color: rgba(255, 255, 255, 0.06); 
                box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.7); 
            }
            50% { 
                border-color: rgba(99, 102, 241, 0.4); 
                box-shadow: 0 30px 60px -15px var(--pw-accent-glow); 
            }
        }

        @keyframes logoNeonGlow {
            0%, 100% { 
                text-shadow: 0 0 15px rgba(99, 102, 241, 0.3);
                filter: hue-rotate(0deg);
            }
            50% { 
                text-shadow: 0 0 30px rgba(139, 92, 246, 0.7);
                filter: hue-rotate(15deg);
            }
        }

        @keyframes xpPop {
            0% { transform: scale(1); }
            50% { 
                transform: scale(1.25) translateY(-4px); 
                background: linear-gradient(135deg, #10b981, #059669);
                box-shadow: 0 0 35px rgba(16, 185, 129, 0.8); 
            }
            100% { transform: scale(1); }
        }
        .xp-animate { animation: xpPop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.4); }

        @keyframes auroraBar {
            0 { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- IMMERSIVE LOGIN GLASS PORTAL --- */
        #welcome-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #02040a;
            display: flex; justify-content: center; align-items: center;
            z-index: 1000;
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .welcome-box {
            text-align: center; padding: 40px 25px;
            border-radius: 24px; background: rgba(10, 15, 30, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.8);
            width: 90%; max-width: 400px;
            backdrop-filter: blur(24px);
            animation: slideUpFade 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .welcome-box h1 { 
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.5rem; font-weight: 900; margin-bottom: 12px; color: #fff; letter-spacing: -1.5px; animation: logoNeonGlow 4s infinite ease-in-out; 
        }
        .welcome-box h1 span { color: var(--pw-accent); }
        .welcome-box p { color: var(--text-muted); margin-bottom: 30px; font-size: 0.9rem; font-weight: 500; }

        .welcome-box input {
            padding: 14px 20px; font-size: 1rem; border: 1px solid var(--pw-border);
            border-radius: 14px; background: rgba(255,255,255,0.02); color: #fff;
            outline: none; text-align: center; width: 100%; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-bottom: 20px; font-weight: 600;
        }
        .welcome-box input:focus { border-color: var(--pw-accent); background: rgba(255,255,255,0.05); box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.25); }

        .welcome-box button {
            padding: 14px; background: linear-gradient(135deg, var(--pw-accent), #4f46e5); color: #fff;
            border: none; border-radius: 14px; cursor: pointer; font-weight: 700;
            font-size: 1rem; width: 100%; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .welcome-box button:hover { transform: translateY(-2px); box-shadow: 0 12px 25px rgba(99, 102, 241, 0.45); }

        /* --- RESPONSIVE NAVIGATION BAR --- */
        header {
            display: flex; flex-direction: row; justify-content: space-between; align-items: center;
            padding: 16px 4%; background: rgba(3, 7, 18, 0.5); backdrop-filter: blur(30px);
            position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--pw-border);
            gap: 10px;
        }
        header::after {
            content: ''; position: absolute; bottom: -1px; left: 0; width: 100%; height: 3px;
            background: linear-gradient(90deg, #6366f1, #a855f7, #ec4899, #6366f1);
            background-size: 300% 300%; animation: auroraBar 6s ease infinite;
        }
        .logo { font-family: 'Space Grotesk', sans-serif; font-size: 1.6rem; font-weight: 900; letter-spacing: -1px; animation: logoNeonGlow 5s infinite ease-in-out; cursor: default; }
        .logo span { color: var(--pw-accent); }
        
        .user-stats { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
        #welcome-user { font-weight: 700; color: #fff; background: rgba(255,255,255,0.03); border: 1px solid var(--pw-border); padding: 6px 12px; border-radius: 10px; font-size: 0.8rem; white-space: nowrap; }
        
        .xp-badge { 
            background: linear-gradient(135deg, var(--pw-accent), #4f46e5); 
            color: #fff; padding: 6px 12px; border-radius: 10px; 
            font-weight: 800; font-size: 0.8rem; white-space: nowrap;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.2); 
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.35); 
        }
        .admin-badge { background: linear-gradient(135deg, var(--pw-green), #059669); color: #fff; padding: 6px 12px; border-radius: 10px; font-weight: 800; font-size: 0.8rem; display: none; white-space: nowrap; }
        
        .sync-indicator { 
            font-size: 0.75rem; font-weight: 700; padding: 6px 12px; border-radius: 10px; 
            background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); 
            color: var(--pw-red); transition: all 0.3s ease; display: inline-flex; align-items: center; gap: 6px; white-space: nowrap;
        }
        .sync-indicator span {
            width: 6px; height: 6px; background: var(--pw-red); border-radius: 50%; display: inline-block;
            box-shadow: 0 0 6px var(--pw-red);
        }
        .sync-connected {
            background: rgba(16, 185, 129, 0.1) !important; border-color: rgba(16, 185, 129, 0.2) !important; color: var(--pw-green) !important;
        }
        .sync-connected span { background: var(--pw-green) !important; box-shadow: 0 0 6px var(--pw-green) !important; }

        /* --- RESPONSIVE ROSTER PANEL --- */
        #admin-roster-panel {
            display: none; background: rgba(17, 24, 39, 0.3); border: 1px solid var(--pw-border);
            border-radius: 20px; padding: 20px; max-width: 1200px; margin: 20px 20px 0 20px;
            backdrop-filter: blur(16px); animation: slideUpFade 0.5s ease;
        }
        @media(min-width: 1240px) { #admin-roster-panel { margin: 30px auto 0 auto; } }
        #admin-roster-panel h2 { font-size: 1rem; color: #fff; margin-bottom: 15px; font-weight: 800; display: flex; align-items: center; gap: 10px; }
        #admin-roster-panel h2 .pulse-dot { width: 8px; height: 8px; background-color: var(--pw-green); border-radius: 50%; display: inline-block; box-shadow: 0 0 10px var(--pw-green); }
        .roster-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
        
        .student-profile-card { 
            background: rgba(255,255,255,0.02); border: 1px solid var(--pw-border); padding: 12px; border-radius: 12px; backdrop-filter: blur(5px);
            transition: all 0.3s ease; position: relative; overflow: hidden;
        }
        .student-profile-card::before { content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%; background: var(--pw-accent); }

        /* --- ORIENTATION & CONTAINER RESPONSIVENESS --- */
        .container { max-width: 1200px; margin: 30px auto; padding: 0 16px; }
        .subject-section { margin-bottom: 50px; }
        
        .subject-header-container {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 25px; border-bottom: 1px solid var(--pw-border); padding-bottom: 12px;
        }
        .subject-title { font-family: 'Space Grotesk', sans-serif; font-size: 1.6rem; font-weight: 900; color: #fff; position: relative; letter-spacing: -0.5px; }
        .subject-title::after {
            content: ''; position: absolute; bottom: -13px; left: 0; width: 35px; height: 3px; background: linear-gradient(90deg, var(--pw-accent), var(--pw-purple)); border-radius: 4px;
        }
        
        .btn-create-slot {
            background: rgba(99, 102, 241, 0.08); border: 1px solid var(--pw-accent);
            color: #fff; padding: 10px 18px; border-radius: 12px;
            cursor: pointer; font-weight: 700; font-size: 0.8rem; display: none;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .btn-create-slot:hover { background: var(--pw-accent); transform: translateY(-2px); }

        /* --- ADAPTIVE CLASSROOM SLOTS --- */
        .slots-grid { display: grid; grid-template-columns: 1fr; gap: 30px; }
        
        .master-slot-card {
            background: var(--pw-card); border-radius: 24px; padding: 25px;
            border: 1px solid var(--pw-border); backdrop-filter: blur(30px); position: relative;
            animation: slideUpFade 0.8s cubic-bezier(0.16, 1, 0.3, 1), slotGlow 8s infinite ease-in-out;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.4s ease;
        }
        @media (min-width: 768px) { .master-slot-card { padding: 35px; } }
        
        .slot-title-area { display: flex; flex-direction: row; justify-content: space-between; align-items: center; margin-bottom: 25px; gap: 10px; }
        .master-slot-card h3 { font-size: 1.2rem; font-weight: 900; color: #fff; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .master-slot-card h3 span { font-size: 0.7rem; background: rgba(99, 102, 241, 0.12); border: 1px solid rgba(99, 102, 241, 0.25); padding: 4px 10px; border-radius: 8px; color: #a5b4fc; font-weight: 800; }

        .btn-delete-slot {
            background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5; padding: 6px 12px; border-radius: 8px; cursor: pointer;
            font-size: 0.7rem; font-weight: 700; display: none; white-space: nowrap;
        }

        /* Responsive Inner Buckets Orientation */
        .sub-slots-container { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 900px) { .sub-slots-container { grid-template-columns: repeat(3, 1fr); gap: 20px; } }
        
        .inner-bucket {
            background: rgba(10, 15, 30, 0.4); border-radius: 16px; padding: 20px;
            border: 1px solid var(--pw-border); display: flex; flex-direction: column; justify-content: space-between;
            min-height: 180px; transition: all 0.3s ease;
        }
        .inner-bucket:hover { transform: translateY(-4px); border-color: rgba(255,255,255,0.15); background: rgba(21, 27, 48, 0.8) !important; }
        .inner-bucket h4 { font-size: 0.9rem; font-weight: 800; color: #fff; margin-bottom: 15px; border-bottom: 1px solid var(--pw-border); padding-bottom: 10px; }

        .content-list { list-style: none; margin-bottom: 15px; }
        .content-item {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255, 255, 255, 0.01); padding: 10px 14px; border-radius: 10px;
            margin-bottom: 8px; font-size: 0.85rem; border: 1px solid var(--pw-border); color: #e2e8f0; gap: 10px;
        }
        .content-item span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 150px; }
        
        .item-actions-wrapper { display: flex; gap: 6px; align-items: center; }
        .btn-delete-item {
            background: rgba(239, 68, 68, 0.1); border: none; color: #fca5a5; padding: 6px 10px;
            border-radius: 6px; cursor: pointer; font-size: 0.7rem; font-weight: 700; display: none;
        }

        .btn-view {
            background: rgba(255, 255, 255, 0.05); color: #fff; padding: 6px 14px;
            border-radius: 8px; cursor: pointer; font-size: 0.75rem; border: 1px solid rgba(255,255,255,0.1);
            font-weight: 700; transition: all 0.2s ease; white-space: nowrap;
        }
        .btn-view:hover { background: var(--pw-accent); border-color: transparent; box-shadow: 0 0 10px var(--pw-accent); }

        .admin-upload-panel { display: none; margin-top: auto; }
        .native-pdf-label {
            display: block; background: rgba(99, 102, 241, 0.03); color: #a5b4fc; padding: 10px 12px;
            border-radius: 10px; cursor: pointer; font-size: 0.75rem; font-weight: 700; 
            border: 1px dashed rgba(99, 102, 241, 0.4); text-align: center;
        }

        /* --- ADJUSTED SECURE MODAL FOR ALL DEVICES --- */
        #viewer-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(3, 5, 10, 0.95); display: none;
            justify-content: center; align-items: center; z-index: 2000;
            backdrop-filter: blur(20px); padding: 10px;
        }
        .modal-content {
            width: 100%; height: 100%; background: #0b0f19;
            border-radius: 16px; overflow: hidden; position: relative;
            border: 1px solid rgba(255,255,255,0.08); display: flex; flex-direction: column;
        }
        @media(min-width: 768px) { .modal-content { width: 94%; height: 90%; border-radius: 28px; } }
        
        .close-modal { 
            position: absolute; top: 12px; right: 12px; color: #fff; 
            font-size: 0.75rem; cursor: pointer; font-weight: 800; 
            background: rgba(239, 68, 68, 0.15); border: 1px solid rgba(239, 68, 68, 0.3);
            padding: 8px 16px; border-radius: 8px; z-index: 2100; text-transform: uppercase;
        }
        #view-frame { width: 100%; height: 100%; border: none; background: #0b0f19; flex-grow: 1; padding-top: 60px; }

        /* --- DIALOG COMPONENT --- */
        #custom-dialog-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 4, 8, 0.85); display: none;
            justify-content: center; align-items: center; z-index: 4000;
            backdrop-filter: blur(20px); padding: 20px;
        }
        .dialog-box {
            width: 100%; max-width: 440px; background: rgba(15, 23, 42, 0.95);
            border-radius: 20px; padding: 25px; border: 1px solid var(--pw-border); text-align: center;
        }
        .dialog-box h3 { font-size: 1.2rem; font-weight: 800; color: #fff; margin-bottom: 10px; }
        .dialog-box p { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 20px; }
        .dialog-box input {
            width: 100%; padding: 12px 16px; border-radius: 10px; border: 1px solid var(--pw-border);
            background: rgba(255,255,255,0.03); color: #fff; font-size: 0.95rem; outline: none; margin-bottom: 20px; text-align: center;
        }
        .dialog-actions { display: flex; gap: 10px; justify-content: center; }
        .dialog-actions button { padding: 10px 20px; font-size: 0.85rem; font-weight: 700; border-radius: 8px; cursor: pointer; border: none; }
    </style>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>

    <canvas id="particle-canvas"></canvas>
    <div class="bg-glow-1"></div><div class="bg-glow-2"></div>

    <div id="welcome-screen">
        <div class="welcome-box">
            <h1>SCIENCE_<span>IX</span></h1>
            <p>Sign in to access your batch classroom</p>
            <input type="text" id="username-input" placeholder="Enter Student Name / ID" autocomplete="off"><br>
            <button id="auth-submit-btn" onclick="entrySetup()">Let's Study</button>
        </div>
    </div>

    <header>
        <div class="logo">SCIENCE_<span>IX</span></div>
        <div class="user-stats">
            <span id="sync-status" class="sync-indicator"><span></span> Connecting...</span>
            <span id="welcome-user">Loading...</span>
            <div id="admin-indicator" class="admin-badge">Admin</div>
            <div id="xp-badge-wrapper" class="xp-badge">✨ <span id="xp-count">0</span> XP</div>
        </div>
    </header>

    <div id="admin-roster-panel">
        <h2><span class="pulse-dot"></span> Classroom Management (Active Student Profiles)</h2>
        <div class="roster-grid" id="roster-grid-target"></div>
    </div>

    <div class="container">
        <section class="subject-section">
            <div class="subject-header-container">
                <h2 class="subject-title">Physics</h2>
                <button class="btn-create-slot" id="btn-create-phy" onclick="handleCreateTopicClick('phy-slots-target')">+ New Topic</button>
            </div>
            <div class="slots-grid" id="phy-slots-target"></div>
        </section>

        <section class="subject-section">
            <div class="subject-header-container">
                <h2 class="subject-title">Chemistry</h2>
                <button class="btn-create-slot" id="btn-create-chem" onclick="handleCreateTopicClick('chem-slots-target')">+ New Topic</button>
            </div>
            <div class="slots-grid" id="chem-slots-target"></div>
        </section>

        <section class="subject-section">
            <div class="subject-header-container">
                <h2 class="subject-title">Biology</h2>
                <button class="btn-create-slot" id="btn-create-bio" onclick="handleCreateTopicClick('bio-slots-target')">+ New Topic</button>
            </div>
            <div class="slots-grid" id="bio-slots-target"></div>

    <div id="viewer-modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeViewer()">✕ Close</span>

        </div>
    </div>

    <div id="custom-dialog-modal">
        <div class="dialog-box" id="dialog-box-content"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAs79VbT889T-Ouy_Y-1wREx86u8o_L6ks",
            authDomain: "science-ix-87252.firebaseapp.com",
            projectId: "science-ix-87252",
            storageBucket: "science-ix-87252.appspot.com",
            messagingSenderId: "364508216393",
            appId: "1:364508216393:web:bda878bc90069cb23214da"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let activeUser = localStorage.getItem('science_ix_session');
        let currentXP = 0;
        let readLog = []; // Local tracking cache for opened assignments to prevent repeated XP exploits

        // Background floating starfield physics simulation logic
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5 + 1; this.speedX = Math.random() * 0.3 - 0.15;
                this.speedY = Math.random() * 0.3 - 0.15; this.opacity = Math.random() * 0.4 + 0.1;
            }
            update() {
                this.x += this.speedX; this.y += this.speedY;
                if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
                if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
            }
            draw() { ctx.fillStyle = `rgba(99, 102, 241, ${this.opacity})`; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
        }
        function initParticles() { particles = []; for (let i = 0; i < 25; i++) particles.push(new Particle()); }
        initParticles();
        function animateParticles() { ctx.clearRect(0, 0, canvas.width, canvas.height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animateParticles); }
        animateParticles();

        // Custom dialogues to bypass desktop/mobile native popup blocks
        function showCustomPrompt(title, placeholder, onConfirm) {
            const modal = document.getElementById('custom-dialog-modal');
            const target = document.getElementById('dialog-box-content');
            target.innerHTML = `
                <h3>${title}</h3>
                <input type="text" id="custom-prompt-input" placeholder="${placeholder}" autocomplete="off">
                <div class="dialog-actions">
                    <button class="btn-dialog-secondary" onclick="closeCustomDialog()">Cancel</button>
                    <button class="btn-dialog-primary" id="btn-dialog-confirm">Submit</button>
                </div>
            `;
            modal.style.display = 'flex';
            document.getElementById('btn-dialog-confirm').onclick = () => {
                const val = document.getElementById('custom-prompt-input').value.trim();
                closeCustomDialog(); if (val) onConfirm(val);
            };
        }

        function showCustomConfirm(title, message, onConfirm) {
            const modal = document.getElementById('custom-dialog-modal');
            const target = document.getElementById('dialog-box-content');
            target.innerHTML = `
                <h3>${title}</h3><p>${message}</p>
                <div class="dialog-actions">
                    <button class="btn-dialog-secondary" onclick="closeCustomDialog()">Cancel</button>
                    <button class="btn-dialog-primary" id="btn-dialog-confirm">Confirm</button>
                </div>
            `;
            modal.style.display = 'flex';
            document.getElementById('btn-dialog-confirm').onclick = () => { closeCustomDialog(); onConfirm(); };
        }

        function showCustomAlert(title, message) {
            const modal = document.getElementById('custom-dialog-modal');
            const target = document.getElementById('dialog-box-content');
            target.innerHTML = `
                <h3>${title}</h3><p>${message}</p>
                <div class="dialog-actions"><button class="btn-dialog-primary" onclick="closeCustomDialog()">OK</button></div>
            `;
            modal.style.display = 'flex';
        }
        function closeCustomDialog() { document.getElementById('custom-dialog-modal').style.display = 'none'; }

        auth.signInAnonymously().catch(err => console.error("Cloud Auth exception:", err));

        window.addEventListener('DOMContentLoaded', () => {
            if (activeUser) {
                applyIdentityConfig(activeUser);
                document.getElementById('welcome-screen').style.display = 'none';
                syncStudentProfileCloud(activeUser);
            }
            listenToGlobalCurriculum();
            listenToActiveRoster();
        });

        function entrySetup() {
            const inputName = document.getElementById('username-input').value.trim();
            if (!inputName) { showCustomAlert("Identity Check", "Please enter your Student ID / Name!"); return; }
            activeUser = inputName;
            localStorage.setItem('science_ix_session', inputName);
            syncStudentProfileCloud(inputName);
            applyIdentityConfig(inputName);
            document.getElementById('welcome-screen').style.display = 'none';
        }

        function applyIdentityConfig(username) {
            document.getElementById('welcome-user').innerText = "👨‍🎓 " + username;
            if (username.toUpperCase() === "PRATIM") {
                document.getElementById('admin-indicator').style.display = 'inline-block';
                document.getElementById('admin-roster-panel').style.display = 'block';
                document.querySelectorAll('.btn-create-slot').forEach(btn => btn.style.display = 'block');
            }
        }

        function syncStudentProfileCloud(username) {
            const keyName = username.toUpperCase();
            const userRef = db.collection('students').doc(keyName);
            userRef.get().then(doc => {
                if (doc.exists) {
                    currentXP = doc.data().xp || 0;
                    readLog = doc.data().readLog || [];
                    document.getElementById('xp-count').innerText = currentXP;
                } else {
                    userRef.set({ name: username, xp: 0, readLog: [], joined: new Date().toLocaleDateString() });
                }
            });
        }

        function triggerXPEffect() {
            const badge = document.getElementById('xp-badge-wrapper');
            badge.classList.add('xp-animate');
            setTimeout(() => badge.classList.remove('xp-animate'), 600);
        }

        function listenToActiveRoster() {
            db.collection('students').onSnapshot(snapshot => {
                const rosterGrid = document.getElementById('roster-grid-target');
                if (!rosterGrid) return;
                rosterGrid.innerHTML = "";
                snapshot.forEach(doc => {
                    const profile = doc.data();
                    const card = document.createElement('div');
                    card.className = 'student-profile-card';
                    card.innerHTML = `<strong style="color: #fff;">${profile.name}</strong><br><span style="color: var(--text-muted); font-size:0.75rem;">✨ ${profile.xp} XP</span>`;
                    rosterGrid.appendChild(card);
                    if (activeUser && doc.id === activeUser.toUpperCase()) {
                        currentXP = profile.xp || 0;
                        readLog = profile.readLog || [];
                        document.getElementById('xp-count').innerText = currentXP;
                    }
                });
            });
        }

        function listenToGlobalCurriculum() {
            db.collection('curriculum').doc('master_data').onSnapshot(doc => {
                const indicator = document.getElementById('sync-status');
                indicator.className = "sync-indicator sync-connected";
                indicator.innerHTML = "<span></span> Cloud Synced";
                if (doc.exists) { renderUIFromData(doc.data()); }
            });
        }

        function renderUIFromData(data) {
            window.latestCloudPayload = data;
            Object.keys(data).forEach(containerId => {
                const targetDiv = document.getElementById(containerId);
                if (!targetDiv) return; targetDiv.innerHTML = "";
                data[containerId].forEach(slot => buildSlotCardDOM(containerId, slot));
            });
        }

        function handleCreateTopicClick(containerId) {
            showCustomPrompt("Create New Topic", "Enter chapter title name:", (slotTitle) => {
                const newSlotObj = { id: "slot-" + Date.now(), title: slotTitle, notes: [], dpps: [], tests: [] };
                let workingCopy = window.latestCloudPayload;
                workingCopy[containerId].push(newSlotObj);
                db.collection('curriculum').doc('master_data').set(workingCopy);
            });
        }

        function deleteSlotCard(containerId, slotId) {
            showCustomConfirm("Delete Topic?", "Permanently clean out this whole topic container?", () => {
                let workingCopy = window.latestCloudPayload;
                workingCopy[containerId] = workingCopy[containerId].filter(s => s.id !== slotId);
                db.collection('curriculum').doc('master_data').set(workingCopy);
            });
        }

        function deleteFileItem(containerId, slotId, bucketKey, itemIndex) {
            showCustomConfirm("Delete File?", "Remove this workspace document asset?", () => {
                let workingCopy = window.latestCloudPayload;
                const slotIndex = workingCopy[containerId].findIndex(s => s.id === slotId);
                if (slotIndex !== -1) {
                    workingCopy[containerId][slotIndex][bucketKey].splice(itemIndex, 1);
                    db.collection('curriculum').doc('master_data').set(workingCopy);
                }
            });
        }

        function buildSlotCardDOM(containerId, slotObj) {
            const targetDiv = document.getElementById(containerId);
            const masterSlot = document.createElement('div');
            masterSlot.className = 'master-slot-card'; masterSlot.id = slotObj.id;
            const isAdmin = (activeUser && activeUser.toUpperCase() === "PRATIM");
            const dStyle = isAdmin ? 'style="display:block;"' : '';
            const fStyle = isAdmin ? 'style="display:inline-block;"' : '';

            masterSlot.innerHTML = `
                <div class="slot-title-area">
                    <h3>${slotObj.title} <span>9th Batch Studio</span></h3>
                    <button class="btn-delete-slot" ${fStyle} onclick="deleteSlotCard('${containerId}', '${slotObj.id}')">🗑 Delete Topic</button>
                </div>
                <div class="sub-slots-container">
                    <div class="inner-bucket">
                        <div>
                            <h4>📚 Class Notes (PDF Only)</h4>
                            <ul class="content-list" id="list-notes-${slotObj.id}"></ul>
                        </div>
                        <div class="admin-upload-panel" ${dStyle}>
                            <label class="native-pdf-label" for="file-notes-${slotObj.id}">📤 Upload Notes PDF</label>
                            <input type="file" id="file-notes-${slotObj.id}" accept=".pdf" style="display:none;" onchange="handleUniversalUpload('${containerId}', '${slotObj.id}', 'notes', this)">
                        </div>
                    </div>
                    
                    <div class="inner-bucket">
                        <div>
                            <h4>📝 Practice Papers (PDF / HTML)</h4>
                            <ul class="content-list" id="list-dpps-${slotObj.id}"></ul>
                        </div>
                        <div class="admin-upload-panel" ${dStyle}>
                            <label class="native-pdf-label" for="file-dpps-${slotObj.id}">📤 Upload DPP (PDF/HTML)</label>
                            <input type="file" id="file-dpps-${slotObj.id}" accept=".pdf,.html" style="display:none;" onchange="handleUniversalUpload('${containerId}', '${slotObj.id}', 'dpps', this)">
                        </div>
                    </div>

                    <div class="inner-bucket">
                        <div>
                            <h4>🏆 Monthly Tests (PDF / HTML)</h4>
                            <ul class="content-list" id="list-tests-${slotObj.id}"></ul>
                        </div>
                        <div class="admin-upload-panel" ${dStyle}>
                            <label class="native-pdf-label" for="file-tests-${slotObj.id}">📤 Upload Test (PDF/HTML)</label>
                            <input type="file" id="file-tests-${slotObj.id}" accept=".pdf,.html" style="display:none;" onchange="handleUniversalUpload('${containerId}', '${slotObj.id}', 'tests', this)">
                        </div>
                    </div>
                </div>
            `;
            targetDiv.appendChild(masterSlot);
            renderFileItems(containerId, slotObj.id, slotObj.notes, `list-notes-${slotObj.id}`, 'notes');
            renderFileItems(containerId, slotObj.id, slotObj.dpps, `list-dpps-${slotObj.id}`, 'dpps');
            renderFileItems(containerId, slotObj.id, slotObj.tests, `list-tests-${slotObj.id}`, 'tests');
        }

        function renderFileItems(containerId, slotId, itemsArray, listElementId, bucketKey) {
            const listContainer = document.getElementById(listElementId);
            if (!listContainer || !itemsArray) return; listContainer.innerHTML = "";
            const isAdmin = (activeUser && activeUser.toUpperCase() === "PRATIM");
            const actStyle = isAdmin ? 'style="display:inline-block;"' : '';

            itemsArray.forEach((item, index) => {
                const rowItem = document.createElement('li');
                rowItem.className = 'content-item';
                const typeIcon = (item.type === 'html') ? '🌐' : '📁';
                rowItem.innerHTML = `
                    <span>${typeIcon} ${item.name}</span>
                    <div class="item-actions-wrapper">
                        <button class="btn-delete-item" ${actStyle} onclick="deleteFileItem('${containerId}', '${slotId}', '${bucketKey}', ${index})">✕</button>
                        <button class="btn-view" onclick="launchSecureViewer('${containerId}', '${slotId}', '${bucketKey}', ${index})">Open File</button>
                    </div>
                `;
                listContainer.appendChild(rowItem);
            });
        }

        function handleUniversalUpload(containerId, slotId, bucketKey, inputElement) {
            const file = inputElement.files[0]; if (!file) return;
            if (file.size > 1048576) { showCustomAlert("Capacity cap", "Keep storage files strictly under 1MB!"); return; }

            const fileExtension = file.name.split('.').pop().toLowerCase();
            showCustomPrompt("Save Asset File", "Enter display item title name label:", (nameLabel) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    let encodedString = e.target.result;
                    // If file is raw HTML text, construct a virtual sandboxed iframe-safe dataURL structure payload
                    if (fileExtension === 'html') {
                        const rawText = new TextDecoder("utf-8").decode(e.target.result);
                        encodedString = 'data:text/html;charset=utf-8,' + encodeURIComponent(rawText);
                    }
                    
                    let workingCopy = window.latestCloudPayload;
                    const slotIndex = workingCopy[containerId].findIndex(s => s.id === slotId);
                    if (slotIndex !== -1) {
                        if (!workingCopy[containerId][slotIndex][bucketKey]) workingCopy[containerId][slotIndex][bucketKey] = [];
                        
                        // Push with globally unique asset file IDs to prevent tracking collisions
                        const uniqueFileId = "file-" + Date.now() + "-" + Math.floor(Math.random() * 1000);
                        workingCopy[containerId][slotIndex][bucketKey].push({ 
                            id: uniqueFileId, 
                            name: nameLabel, 
                            data: encodedString,
                            type: fileExtension 
                        });
                        db.collection('curriculum').doc('master_data').set(workingCopy);
                    }
                };
                if (fileExtension === 'html') { reader.readAsArrayBuffer(file); } 
                else { reader.readAsDataURL(file); }
            });
        }

        function launchSecureViewer(containerId, slotId, bucketKey, fileIndex) {
            const slotObj = window.latestCloudPayload[containerId].find(s => s.id === slotId);
            const fileObj = slotObj[bucketKey][fileIndex];
            const modal = document.getElementById('viewer-modal');
            const frame = document.getElementById('view-frame');
            
            frame.src = fileObj.data;
            modal.style.display = 'flex';

            // --- ONE-TIME ONLY XP ENGINE CONTROL PIPELINE ---
            if (activeUser && activeUser.toUpperCase() !== "PRATIM") {
                const fileUniqueId = fileObj.id || (slotId + "-" + bucketKey + "-" + fileIndex);
                const keyName = activeUser.toUpperCase();

                if (!readLog.includes(fileUniqueId)) {
                    readLog.push(fileUniqueId);
                    db.collection('students').doc(keyName).update({
                        xp: firebase.firestore.FieldValue.increment(15),
                        readLog: readLog
                    }).then(() => {
                        triggerXPEffect();
                    });
                }
            }
        }

        function closeViewer() { document.getElementById('viewer-modal').style.display = 'none'; document.getElementById('view-frame').src = ""; }
    </script>
</body>
</html>
