<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCIENCE_IX | Real-Time Sync Portal</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --pw-primary: #070a13; 
            --pw-accent: #6366f1;  
            --pw-accent-glow: rgba(99, 102, 241, 0.4);
            --pw-bg: #030712;      
            --pw-card: rgba(17, 24, 39, 0.7);    
            --text-main: #f8fafc;  
            --text-muted: #94a3b8; 
            --pw-green: #10b981;  
            --pw-purple: #8b5cf6;
            --pw-red: #ef4444;
            --pw-border: rgba(255, 255, 255, 0.08); 
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background-color: var(--pw-bg);
            color: var(--text-main);
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
        }

        /* Ambient Background Glows */
        .bg-glow-1 {
            position: fixed; top: -10%; left: -10%; width: 50vw; height: 50vw;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 70%);
            z-index: -1; pointer-events: none;
        }
        .bg-glow-2 {
            position: fixed; bottom: -10%; right: -10%; width: 50vw; height: 50vw;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.1) 0%, transparent 70%);
            z-index: -1; pointer-events: none;
        }

        #particle-canvas {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1; pointer-events: none;
        }

        /* --- KINETIC ANIMATIONS --- */
        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(30px); filter: blur(10px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        @keyframes slotGlow {
            0%, 100% { 
                border-color: rgba(255, 255, 255, 0.06); 
                box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.7); 
            }
            50% { 
                border-color: rgba(99, 102, 241, 0.4); 
                box-shadow: 0 30px 60px -15px var(--pw-accent-glow); 
            }
        }

        @keyframes logoNeonGlow {
            0%, 100% { 
                text-shadow: 0 0 15px rgba(99, 102, 241, 0.3);
                filter: hue-rotate(0deg);
            }
            50% { 
                text-shadow: 0 0 30px rgba(139, 92, 246, 0.7);
                filter: hue-rotate(15deg);
            }
        }

        @keyframes xpPop {
            0% { transform: scale(1); }
            50% { 
                transform: scale(1.25) translateY(-4px); 
                background: linear-gradient(135deg, #10b981, #059669);
                box-shadow: 0 0 35px rgba(16, 185, 129, 0.8); 
            }
            100% { transform: scale(1); }
        }
        .xp-animate { animation: xpPop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.4); }

        @keyframes auroraBar {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- IMMERSIVE LOGIN GLASS PORTAL --- */
        #welcome-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #02040a;
            display: flex; justify-content: center; align-items: center;
            z-index: 1000;
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .welcome-box {
            text-align: center; padding: 60px 45px;
            border-radius: 32px; background: rgba(10, 15, 30, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.8);
            width: 90%; max-width: 440px;
            backdrop-filter: blur(24px);
            animation: slideUpFade 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .welcome-box h1 { 
            font-family: 'Space Grotesk', sans-serif;
            font-size: 3rem; font-weight: 900; margin-bottom: 12px; color: #fff; letter-spacing: -1.5px; animation: logoNeonGlow 4s infinite ease-in-out; 
        }
        .welcome-box h1 span { color: var(--pw-accent); }
        .welcome-box p { color: var(--text-muted); margin-bottom: 35px; font-size: 0.95rem; font-weight: 500; }

        .welcome-box input {
            padding: 16px 24px; font-size: 1rem; border: 1px solid var(--pw-border);
            border-radius: 16px; background: rgba(255,255,255,0.02); color: #fff;
            outline: none; text-align: center; width: 100%; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-bottom: 24px; font-weight: 600;
        }
        .welcome-box input:focus { border-color: var(--pw-accent); background: rgba(255,255,255,0.05); box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.25); }

        .welcome-box button {
            padding: 16px; background: linear-gradient(135deg, var(--pw-accent), #4f46e5); color: #fff;
            border: none; border-radius: 16px; cursor: pointer; font-weight: 700;
            font-size: 1rem; width: 100%; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .welcome-box button:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(99, 102, 241, 0.45); }

        /* --- STICKY NAVIGATION BAR --- */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 24px 6%; background: rgba(3, 7, 18, 0.5); backdrop-filter: blur(30px);
            position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--pw-border);
        }
        header::after {
            content: ''; position: absolute; bottom: -1px; left: 0; width: 100%; height: 3px;
            background: linear-gradient(90deg, #6366f1, #a855f7, #ec4899, #6366f1);
            background-size: 300% 300%; animation: auroraBar 6s ease infinite;
        }
        .logo { font-family: 'Space Grotesk', sans-serif; font-size: 2rem; font-weight: 900; letter-spacing: -1px; animation: logoNeonGlow 5s infinite ease-in-out; cursor: default; }
        .logo span { color: var(--pw-accent); }
        
        .user-stats { display: flex; gap: 15px; align-items: center; }
        #welcome-user { font-weight: 700; color: #fff; background: rgba(255,255,255,0.03); border: 1px solid var(--pw-border); padding: 8px 18px; border-radius: 12px; font-size: 0.9rem; }
        
        .xp-badge { 
            background: linear-gradient(135deg, var(--pw-accent), #4f46e5); 
            color: #fff; padding: 8px 18px; border-radius: 12px; 
            font-weight: 800; font-size: 0.85rem; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.2); 
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.35); 
        }
        .admin-badge { background: linear-gradient(135deg, var(--pw-green), #059669); color: #fff; padding: 8px 18px; border-radius: 12px; font-weight: 800; font-size: 0.85rem; display: none; }
        
        /* Interactive Connection Engine Status Indicators */
        .sync-indicator { 
            font-size: 0.75rem; font-weight: 700; padding: 8px 14px; border-radius: 12px; 
            background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); 
            color: var(--pw-red); transition: all 0.3s ease; display: inline-flex; align-items: center; gap: 6px;
        }
        .sync-indicator span {
            width: 8px; height: 8px; background: var(--pw-red); border-radius: 50%; display: inline-block;
            box-shadow: 0 0 8px var(--pw-red);
        }
        .sync-connected {
            background: rgba(16, 185, 129, 0.1) !important; border-color: rgba(16, 185, 129, 0.2) !important; color: var(--pw-green) !important;
        }
        .sync-connected span { background: var(--pw-green) !important; box-shadow: 0 0 8px var(--pw-green) !important; }

        /* --- CLASSROOM MANAGEMENT PANEL --- */
        #admin-roster-panel {
            display: none; background: rgba(17, 24, 39, 0.3); border: 1px solid var(--pw-border);
            border-radius: 24px; padding: 30px; max-width: 1200px; margin: 30px auto 0 auto;
            backdrop-filter: blur(16px); animation: slideUpFade 0.5s ease;
        }
        #admin-roster-panel h2 { font-size: 1.1rem; color: #fff; margin-bottom: 20px; font-weight: 800; letter-spacing: -0.3px; display: flex; align-items: center; gap: 10px; }
        #admin-roster-panel h2 .pulse-dot { width: 8px; height: 8px; background-color: var(--pw-green); border-radius: 50%; display: inline-block; box-shadow: 0 0 10px var(--pw-green); }
        .roster-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        
        .student-profile-card { 
            background: rgba(255,255,255,0.02); border: 1px solid var(--pw-border); padding: 16px; border-radius: 14px; backdrop-filter: blur(5px);
            transition: all 0.3s ease; position: relative; overflow: hidden;
        }
        .student-profile-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%; background: var(--pw-accent);
        }
        .student-profile-card:hover { transform: translateY(-3px); background: rgba(255,255,255,0.05); }

        /* --- LAYOUT STRUCTURE --- */
        .container { max-width: 1200px; margin: 50px auto; padding: 0 24px; }
        .subject-section { margin-bottom: 80px; }
        
        .subject-header-container {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 30px; border-bottom: 1px solid var(--pw-border); padding-bottom: 16px;
        }
        .subject-title { font-family: 'Space Grotesk', sans-serif; font-size: 2rem; font-weight: 900; color: #fff; position: relative; letter-spacing: -0.5px; }
        .subject-title::after {
            content: ''; position: absolute; bottom: -17px; left: 0; width: 45px; height: 4px; background: linear-gradient(90deg, var(--pw-accent), var(--pw-purple)); border-radius: 4px;
        }
        
        .btn-create-slot {
            background: rgba(99, 102, 241, 0.08); border: 1px solid var(--pw-accent);
            color: #fff; padding: 12px 24px; border-radius: 14px;
            cursor: pointer; font-weight: 700; font-size: 0.85rem; display: none;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .btn-create-slot:hover { background: var(--pw-accent); transform: translateY(-3px); box-shadow: 0 8px 25px rgba(99, 102, 241, 0.3); }

        /* --- CLASSROOM SLOTS --- */
        .slots-grid { display: grid; grid-template-columns: 1fr; gap: 40px; }
        
        .master-slot-card {
            background: var(--pw-card); border-radius: 32px; padding: 40px;
            border: 1px solid var(--pw-border); backdrop-filter: blur(30px);
            position: relative;
            animation: slideUpFade 0.8s cubic-bezier(0.16, 1, 0.3, 1), slotGlow 8s infinite ease-in-out;
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.5s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.5s ease;
        }
        .master-slot-card:hover {
            transform: translateY(-10px) scale(1.01);
            border-color: rgba(139, 92, 246, 0.4);
            box-shadow: 0 35px 70px -15px rgba(139, 92, 246, 0.25);
        }
        
        .slot-title-area { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .master-slot-card h3 { font-size: 1.5rem; font-weight: 900; color: #fff; display: flex; align-items: center; gap: 14px; letter-spacing: -0.5px; }
        .master-slot-card h3 span { font-size: 0.75rem; background: rgba(99, 102, 241, 0.12); border: 1px solid rgba(99, 102, 241, 0.25); padding: 5px 14px; border-radius: 10px; color: #a5b4fc; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }

        .btn-delete-slot {
            background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5; padding: 8px 16px; border-radius: 10px; cursor: pointer;
            font-size: 0.75rem; font-weight: 700; transition: all 0.3s ease; display: none;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .btn-delete-slot:hover { background: var(--pw-red); color: #fff; border-color: transparent; box-shadow: 0 5px 15px rgba(239, 68, 68, 0.4); transform: scale(1.05); }

        .sub-slots-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 28px; }
        
        .inner-bucket {
            background: rgba(10, 15, 30, 0.4); border-radius: 20px; padding: 26px;
            border: 1px solid var(--pw-border); display: flex; flex-direction: column; justify-content: space-between;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .master-slot-card:hover .inner-bucket { background: rgba(10, 15, 30, 0.6); }
        .inner-bucket:hover { transform: translateY(-6px); border-color: rgba(255,255,255,0.18); background: rgba(21, 27, 48, 0.8) !important; box-shadow: 0 15px 30px rgba(0,0,0,0.4); }
        
        .inner-bucket h4 { font-size: 1rem; font-weight: 800; color: #fff; margin-bottom: 20px; border-bottom: 1px solid var(--pw-border); padding-bottom: 12px; letter-spacing: -0.2px; }

        .content-list { list-style: none; margin-bottom: 20px; }
        .content-item {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255, 255, 255, 0.01); padding: 14px 18px; border-radius: 12px;
            margin-bottom: 12px; font-size: 0.9rem; border: 1px solid var(--pw-border);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); font-weight: 500; color: #e2e8f0;
        }
        .content-item:hover { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.12); transform: translateX(4px); color: #fff; }
        
        .item-actions-wrapper { display: flex; gap: 8px; align-items: center; }
        .btn-delete-item {
            background: rgba(239, 68, 68, 0.1); border: none; color: #fca5a5; padding: 8px 12px;
            border-radius: 8px; cursor: pointer; font-size: 0.75rem; font-weight: 700;
            transition: all 0.2s; display: none;
        }
        .btn-delete-item:hover { background: var(--pw-red); color: #fff; }

        .btn-view {
            background: rgba(255, 255, 255, 0.05); color: #fff; padding: 8px 18px;
            border-radius: 10px; cursor: pointer; font-size: 0.8rem; border: 1px solid rgba(255,255,255,0.1);
            font-weight: 700; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .btn-view:hover { background: var(--pw-accent); border-color: transparent; box-shadow: 0 0 15px var(--pw-accent); transform: scale(1.05); }

        .admin-upload-panel { display: none; margin-top: 15px; }
        
        .native-pdf-label {
            display: block; background: rgba(99, 102, 241, 0.03); color: #a5b4fc; padding: 12px 14px;
            border-radius: 12px; cursor: pointer; font-size: 0.8rem; font-weight: 700; 
            border: 1px dashed rgba(99, 102, 241, 0.4); transition: all 0.3s ease; text-align: center;
        }
        .native-pdf-label:hover { background: rgba(99, 102, 241, 0.1); border-color: var(--pw-accent); color: #fff; }

        /* --- VIEW MODAL --- */
        #viewer-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(3, 5, 10, 0.9); display: none;
            justify-content: center; align-items: center; z-index: 2000;
            backdrop-filter: blur(20px);
        }
        .modal-content {
            width: 94%; height: 90%; background: #0b0f19;
            border-radius: 28px; overflow: hidden; position: relative;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 35px 80px rgba(0, 0, 0, 0.9);
            animation: slideUpFade 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .close-modal { 
            position: absolute; top: 18px; right: 24px; color: #fff; 
            font-size: 0.85rem; cursor: pointer; font-weight: 800; 
            background: rgba(239, 68, 68, 0.15); border: 1px solid rgba(239, 68, 68, 0.3);
            padding: 10px 22px; border-radius: 10px; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 2100; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .close-modal:hover { background: rgb(239, 68, 68); box-shadow: 0 0 25px rgba(239, 68, 68, 0.5); transform: translateY(-1px); }
        #view-frame { width: 100%; height: 100%; border: none; padding-top: 75px; background: #0b0f19; }

        /* --- CUSTOM POPUP DIALOGS --- */
        #custom-dialog-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 4, 8, 0.85); display: none;
            justify-content: center; align-items: center; z-index: 4000;
            backdrop-filter: blur(20px);
        }
        .dialog-box {
            width: 90%; max-width: 480px; background: rgba(15, 23, 42, 0.9);
            border-radius: 24px; padding: 35px; border: 1px solid var(--pw-border);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8);
            animation: slideUpFade 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            text-align: center;
        }
        .dialog-box h3 { font-size: 1.4rem; font-weight: 800; color: #fff; margin-bottom: 12px; }
        .dialog-box p { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 24px; line-height: 1.5; }
        .dialog-box input {
            width: 100%; padding: 14px 18px; border-radius: 12px; border: 1px solid var(--pw-border);
            background: rgba(255,255,255,0.03); color: #fff; font-size: 1rem; outline: none; margin-bottom: 24px;
            text-align: center;
        }
        .dialog-box input:focus { border-color: var(--pw-accent); background: rgba(255,255,255,0.06); }
        .dialog-actions { display: flex; gap: 12px; justify-content: center; }
        .dialog-actions button {
            padding: 12px 24px; font-size: 0.9rem; font-weight: 700; border-radius: 10px; cursor: pointer; transition: all 0.2s;
        }
        .btn-dialog-secondary { background: transparent; border: 1px solid var(--pw-border); color: var(--text-muted); }
        .btn-dialog-secondary:hover { background: rgba(255,255,255,0.05); color: #fff; }
        .btn-dialog-primary { background: var(--pw-accent); border: none; color: #fff; }
        .btn-dialog-primary:hover { background: #4f46e5; transform: translateY(-1px); }
    </style>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>

    <canvas id="particle-canvas"></canvas>
    
    <div class="bg-glow-1"></div>
    <div class="bg-glow-2"></div>

    <div id="welcome-screen">
        <div class="welcome-box">
            <h1>SCIENCE_<span>IX</span></h1>
            <p>Sign in to access your batch classroom</p>
            <input type="text" id="username-input" placeholder="Enter Student Name / ID" autocomplete="off"><br>
            <button id="auth-submit-btn" onclick="entrySetup()">Let's Study</button>
        </div>
    </div>

    <header>
        <div class="logo">SCIENCE_<span>IX</span></div>
        <div class="user-stats">
            <span id="sync-status" class="sync-indicator"><span></span> Connecting Cloud...</span>
            <span id="welcome-user">Loading Profile...</span>
            <div id="admin-indicator" class="admin-badge">Batch Administrator</div>
            <div id="xp-badge-wrapper" class="xp-badge">✨ <span id="xp-count">0</span> XP</div>
        </div>
    </header>

    <div id="admin-roster-panel">
        <h2><span class="pulse-dot"></span> Classroom Management (Active Student Profiles)</h2>
        <div class="roster-grid" id="roster-grid-target"></div>
    </div>

    <div class="container">
        <section class="subject-section">
            <div class="subject-header-container">
                <h2 class="subject-title">Physics</h2>
                <button class="btn-create-slot" id="btn-create-phy" onclick="handleCreateTopicClick('phy-slots-target')">+ Create New Topic</button>
            </div>
            <div class="slots-grid" id="phy-slots-target"></div>
        </section>

        <section class="subject-section">
            <div class="subject-header-container">
                <h2 class="subject-title">Chemistry</h2>
                <button class="btn-create-slot" id="btn-create-chem" onclick="handleCreateTopicClick('chem-slots-target')">+ Create New Topic</button>
            </div>
            <div class="slots-grid" id="chem-slots-target"></div>
        </section>

        <section class="subject-section">
            <div class="subject-header-container">
                <h2 class="subject-title">Biology</h2>
                <button class="btn-create-slot" id="btn-create-bio" onclick="handleCreateTopicClick('bio-slots-target')">+ Create New Topic</button>
            </div>
            <div class="slots-grid" id="bio-slots-target"></div>
        </section>
    </div>

    <div id="viewer-modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeViewer()">✕ Close PDF View</span>
            <iframe id="view-frame" src=""></iframe>
        </div>
    </div>

    <div id="custom-dialog-modal">
        <div class="dialog-box" id="dialog-box-content"></div>
    </div>

    <script>
        // --- SECURE WEB CORE CONFIGURATION MAP ---
        const firebaseConfig = {
            apiKey: "AIzaSyAs79VbT889T-Ouy_Y-1wREx86u8o_L6ks",
            authDomain: "science-ix-87252.firebaseapp.com",
            projectId: "science-ix-87252",
            storageBucket: "science-ix-87252.appspot.com",
            messagingSenderId: "364508216393",
            appId: "1:364508216393:web:bda878bc90069cb23214da"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let activeUser = localStorage.getItem('science_ix_session');
        let currentXP = 0;

        // Particle floating simulation background layer
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1;
                this.speedX = Math.random() * 0.4 - 0.2;
                this.speedY = Math.random() * 0.4 - 0.2;
                this.opacity = Math.random() * 0.4 + 0.1;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
                if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
            }
            draw() {
                ctx.fillStyle = `rgba(99, 102, 241, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < 40; i++) particles.push(new Particle());
        }
        initParticles();

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        // Custom Modal UI logic
        function showCustomPrompt(title, placeholder, onConfirm) {
            const modal = document.getElementById('custom-dialog-modal');
            const target = document.getElementById('dialog-box-content');
            target.innerHTML = `
                <h3>${title}</h3>
                <input type="text" id="custom-prompt-input" placeholder="${placeholder}" autocomplete="off">
                <div class="dialog-actions">
                    <button class="btn-dialog-secondary" onclick="closeCustomDialog()">Cancel</button>
                    <button class="btn-dialog-primary" id="btn-dialog-confirm">Submit</button>
                </div>
            `;
            modal.style.display = 'flex';
            document.getElementById('btn-dialog-confirm').onclick = () => {
                const val = document.getElementById('custom-prompt-input').value.trim();
                closeCustomDialog();
                if (val) onConfirm(val);
            };
        }

        function showCustomConfirm(title, message, onConfirm) {
            const modal = document.getElementById('custom-dialog-modal');
            const target = document.getElementById('dialog-box-content');
            target.innerHTML = `
                <h3>${title}</h3>
                <p>${message}</p>
                <div class="dialog-actions">
                    <button class="btn-dialog-secondary" onclick="closeCustomDialog()">Cancel</button>
                    <button class="btn-dialog-primary" id="btn-dialog-confirm">Confirm</button>
                </div>
            `;
            modal.style.display = 'flex';
            document.getElementById('btn-dialog-confirm').onclick = () => {
                closeCustomDialog();
                onConfirm();
            };
        }

        function showCustomAlert(title, message) {
            const modal = document.getElementById('custom-dialog-modal');
            const target = document.getElementById('dialog-box-content');
            target.innerHTML = `
                <h3>${title}</h3>
                <p>${message}</p>
                <div class="dialog-actions">
                    <button class="btn-dialog-primary" onclick="closeCustomDialog()">OK</button>
                </div>
            `;
            modal.style.display = 'flex';
        }

        function closeCustomDialog() {
            document.getElementById('custom-dialog-modal').style.display = 'none';
        }

        // --- REAL-TIME DATA CORRELATION ENGINE ---
        auth.signInAnonymously().catch(err => {
            console.error("Auth failed:", err);
            showCustomAlert("Authentication Warning", "Anonymous Sign-In is disabled in Firebase console.");
        });

        window.addEventListener('DOMContentLoaded', () => {
            if (activeUser) {
                applyIdentityConfig(activeUser);
                document.getElementById('welcome-screen').style.display = 'none';
                syncStudentProfileCloud(activeUser);
            }
            listenToGlobalCurriculum();
            listenToActiveRoster();
        });

        function entrySetup() {
            const inputName = document.getElementById('username-input').value.trim();
            if (!inputName) { showCustomAlert("Name Required", "Please enter your Student ID / Name!"); return; }
            activeUser = inputName;
            localStorage.setItem('science_ix_session', inputName);

            syncStudentProfileCloud(inputName);
            applyIdentityConfig(inputName);

            const welcomeScreen = document.getElementById('welcome-screen');
            welcomeScreen.style.opacity = '0';
            setTimeout(() => welcomeScreen.style.display = 'none', 500);
        }

        function applyIdentityConfig(username) {
            document.getElementById('welcome-user').innerText = "👨‍🎓 " + username;
            if (username.toUpperCase() === "PRATIM") {
                document.getElementById('admin-indicator').style.display = 'inline-block';
                document.getElementById('admin-roster-panel').style.display = 'block';
                document.querySelectorAll('.btn-create-slot').forEach(btn => btn.style.display = 'block');
            }
        }

        function syncStudentProfileCloud(username) {
            const keyName = username.toUpperCase();
            const userRef = db.collection('students').doc(keyName);

            userRef.get().then(doc => {
                if (doc.exists) {
                    currentXP = doc.data().xp || 0;
                    document.getElementById('xp-count').innerText = currentXP;
                } else {
                    userRef.set({ name: username, xp: 0, joined: new Date().toLocaleDateString() });
                }
            });
        }

        function triggerXPEffect() {
            const badge = document.getElementById('xp-badge-wrapper');
            badge.classList.add('xp-animate');
            setTimeout(() => badge.classList.remove('xp-animate'), 600);
        }

        // --- REAL-TIME LIVE LISTENERS ---
        function listenToActiveRoster() {
            db.collection('students').onSnapshot(snapshot => {
                const rosterGrid = document.getElementById('roster-grid-target');
                if (!rosterGrid) return;
                rosterGrid.innerHTML = "";

                snapshot.forEach(doc => {
                    const profile = doc.data();
                    const card = document.createElement('div');
                    card.className = 'student-profile-card';
                    card.innerHTML = `<strong style="color: #fff;">${profile.name}</strong><br><span style="color: var(--text-muted); font-size:0.85rem;">✨ ${profile.xp} Study XP</span>`;
                    rosterGrid.appendChild(card);
                    
                    if (activeUser && doc.id === activeUser.toUpperCase()) {
                        currentXP = profile.xp || 0;
                        document.getElementById('xp-count').innerText = currentXP;
                    }
                });
            });
        }

        function listenToGlobalCurriculum() {
            db.collection('curriculum').doc('master_data').onSnapshot(doc => {
                // Switch indicator to connected green
                const indicator = document.getElementById('sync-status');
                indicator.className = "sync-indicator sync-connected";
                indicator.innerHTML = "<span></span> Cloud Synced";

                if (doc.exists) {
                    const cloudData = doc.data();
                    renderUIFromData(cloudData);
                } else {
                    // Seed initial data structure on first run if empty
                    const initialStructure = {
                        'phy-slots-target': [{ id: "phy-1", title: "Chapter 1: Motion & Kinematics", notes: [], dpps: [], tests: [] }],
                        'chem-slots-target': [{ id: "chem-1", title: "Chapter 1: Matter in Our Surrounding", notes: [], dpps: [], tests: [] }],
                        'bio-slots-target': [{ id: "bio-1", title: "Chapter 1: The Fundamental Unit of Life", notes: [], dpps: [], tests: [] }]
                    };
                    db.collection('curriculum').doc('master_data').set(initialStructure);
                }
            }, err => {
                console.error("Firestore read exception:", err);
            });
        }

        function renderUIFromData(data) {
            window.latestCloudPayload = data; // Keep a reference for modifications
            Object.keys(data).forEach(containerId => {
                const targetDiv = document.getElementById(containerId);
                if (!targetDiv) return;
                targetDiv.innerHTML = "";
                data[containerId].forEach(slot => buildSlotCardDOM(containerId, slot));
            });
        }

        function handleCreateTopicClick(containerId) {
            showCustomPrompt("Create New Topic", "Enter the name of the new chapter/topic:", (slotTitle) => {
                const newSlotId = "slot-" + Date.now();
                const newSlotObj = { id: newSlotId, title: slotTitle, notes: [], dpps: [], tests: [] };
                
                let workingCopy = window.latestCloudPayload;
                workingCopy[containerId].push(newSlotObj);
                db.collection('curriculum').doc('master_data').set(workingCopy);
            });
        }

        function deleteSlotCard(containerId, slotId) {
            showCustomConfirm("Delete Entire Topic?", "Are you sure you want to permanently delete this topic and all its contents?", () => {
                let workingCopy = window.latestCloudPayload;
                workingCopy[containerId] = workingCopy[containerId].filter(s => s.id !== slotId);
                db.collection('curriculum').doc('master_data').set(workingCopy);
            });
        }

        function deleteFileItem(containerId, slotId, bucketKey, itemIndex) {
            showCustomConfirm("Delete Document?", "Delete this PDF item?", () => {
                let workingCopy = window.latestCloudPayload;
                const slotIndex = workingCopy[containerId].findIndex(s => s.id === slotId);
                if (slotIndex !== -1) {
                    workingCopy[containerId][slotIndex][bucketKey].splice(itemIndex, 1);
                    db.collection('curriculum').doc('master_data').set(workingCopy);
                }
            });
        }

        function buildSlotCardDOM(containerId, slotObj) {
            const targetDiv = document.getElementById(containerId);
            const masterSlot = document.createElement('div');
            masterSlot.className = 'master-slot-card';
            masterSlot.id = slotObj.id;
            
            const isAdminMode = (activeUser && activeUser.toUpperCase() === "PRATIM");
            const adminDisplayStyle = isAdminMode ? 'style="display:block;"' : '';
            const adminFlexStyle = isAdminMode ? 'style="display:inline-block;"' : '';

            masterSlot.innerHTML = `
                <div class="slot-title-area">
                    <h3>${slotObj.title} <span>Academic Batch Lectures</span></h3>
                    <button class="btn-delete-slot" ${adminFlexStyle} onclick="deleteSlotCard('${containerId}', '${slotObj.id}')">🗑 Eliminate Topic</button>
                </div>
                <div class="sub-slots-container">
                    <div class="inner-bucket">
                        <div>
                            <h4>📚 Class Notes (PDF Documents)</h4>
                            <ul class="content-list" id="list-notes-${slotObj.id}"></ul>
                        </div>
                        <div class="admin-upload-panel" ${adminDisplayStyle}>
                            <label class="native-pdf-label" for="file-notes-${slotObj.id}">📤 Upload Notes PDF</label>
                            <input type="file" id="file-notes-${slotObj.id}" accept=".pdf" style="display:none;" onchange="handlePDFUpload('${containerId}', '${slotObj.id}', 'notes', this)">
                        </div>
                    </div>
                    
                    <div class="inner-bucket">
                        <div>
                            <h4>📝 Daily Practice Papers (DPPs)</h4>
                            <ul class="content-list" id="list-dpps-${slotObj.id}"></ul>
                        </div>
                        <div class="admin-upload-panel" ${adminDisplayStyle}>
                            <label class="native-pdf-label" for="file-dpps-${slotObj.id}">📤 Upload DPP PDF</label>
                            <input type="file" id="file-dpps-${slotObj.id}" accept=".pdf" style="display:none;" onchange="handlePDFUpload('${containerId}', '${slotObj.id}', 'dpps', this)">
                        </div>
                    </div>

                    <div class="inner-bucket">
                        <div>
                            <h4>🏆 Monthly Assessment Tests</h4>
                            <ul class="content-list" id="list-tests-${slotObj.id}"></ul>
                        </div>
                        <div class="admin-upload-panel" ${adminDisplayStyle}>
                            <label class="native-pdf-label" for="file-tests-${slotObj.id}">📤 Upload Test PDF</label>
                            <input type="file" id="file-tests-${slotObj.id}" accept=".pdf" style="display:none;" onchange="handlePDFUpload('${containerId}', '${slotObj.id}', 'tests', this)">
                        </div>
                    </div>
                </div>
            `;
            targetDiv.appendChild(masterSlot);
            
            renderFileItems(containerId, slotObj.id, slotObj.notes, `list-notes-${slotObj.id}`, 'notes');
            renderFileItems(containerId, slotObj.id, slotObj.dpps, `list-dpps-${slotObj.id}`, 'dpps');
            renderFileItems(containerId, slotObj.id, slotObj.tests, `list-tests-${slotObj.id}`, 'tests');
        }

        function renderFileItems(containerId, slotId, itemsArray, listElementId, bucketKey) {
            const listContainer = document.getElementById(listElementId);
            if (!listContainer || !itemsArray) return;
            listContainer.innerHTML = "";
            
            const isAdminMode = (activeUser && activeUser.toUpperCase() === "PRATIM");
            const actionBtnStyle = isAdminMode ? 'style="display:inline-block;"' : '';

            itemsArray.forEach((item, index) => {
                const rowItem = document.createElement('li');
                rowItem.className = 'content-item';
                rowItem.innerHTML = `
                    <span>📁 ${item.name}</span>
                    <div class="item-actions-wrapper">
                        <button class="btn-delete-item" ${actionBtnStyle} onclick="deleteFileItem('${containerId}', '${slotId}', '${bucketKey}', ${index})">✕</button>
                        <button class="btn-view" onclick="launchSecureViewer('${containerId}', '${slotId}', '${bucketKey}', ${index})">Open PDF</button>
                    </div>
                `;
                listContainer.appendChild(rowItem);
            });
        }

        function handlePDFUpload(containerId, slotId, bucketKey, inputElement) {
            const file = inputElement.files[0];
            if (!file) return;

            if (file.size > 1048576) { // 1MB limit for Firestore base64 payload architecture strings
                showCustomAlert("File Too Large", "Please optimize the PDF file size under 1MB for smooth cloud synchronization!");
                return;
            }

            showCustomPrompt("Save PDF", "Enter item display label title:", (nameLabel) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const base64Data = e.target.result;
                    let workingCopy = window.latestCloudPayload;
                    const slotIndex = workingCopy[containerId].findIndex(s => s.id === slotId);
                    
                    if (slotIndex !== -1) {
                        if (!workingCopy[containerId][slotIndex][bucketKey]) workingCopy[containerId][slotIndex][bucketKey] = [];
                        workingCopy[containerId][slotIndex][bucketKey].push({ name: nameLabel, data: base64Data });
                        
                        db.collection('curriculum').doc('master_data').set(workingCopy);
                    }
                };
                reader.readAsDataURL(file);
            });
        }

        function launchSecureViewer(containerId, slotId, bucketKey, fileIndex) {
            const slotObj = window.latestCloudPayload[containerId].find(s => s.id === slotId);
            const fileObj = slotObj[bucketKey][fileIndex];

            const modal = document.getElementById('viewer-modal');
            const frame = document.getElementById('view-frame');
            
            frame.src = fileObj.data;
            modal.style.display = 'flex';

            // Give non-admins 15 XP upon reading learning materials
            if (activeUser && activeUser.toUpperCase() !== "PRATIM") {
                const keyName = activeUser.toUpperCase();
                db.collection('students').doc(keyName).update({
                    xp: firebase.firestore.FieldValue.increment(15)
                }).then(() => {
                    triggerXPEffect();
                });
            }
        }

        function closeViewer() {
            document.getElementById('viewer-modal').style.display = 'none';
            document.getElementById('view-frame').src = "";
        }
    </script>
</body>
</html>
